<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Prof — Dar Al-Kalimah</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --burgundy: #5D1828; --gold: #C8A462; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; background: linear-gradient(135deg, var(--burgundy), #3d0f1a); display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; padding: 20px; }
.card { background: rgba(255,255,255,0.08); border: 1px solid rgba(200,164,98,0.4); border-radius: 20px; padding: 50px 40px; width: 100%; max-width: 480px; text-align: center; }
h1 { font-family: 'Amiri', serif; color: var(--gold); font-size: 2rem; margin-bottom: 8px; }
p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 30px; line-height: 1.6; }
.form-group { margin-bottom: 16px; text-align: left; }
label { display: block; color: rgba(200,164,98,0.8); font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
input { width: 100%; padding: 14px 18px; border: 1.5px solid rgba(200,164,98,0.3); border-radius: 50px; background: rgba(255,255,255,0.08); color: white; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; outline: none; }
input:focus { border-color: var(--gold); }
button { width: 100%; padding: 16px; background: var(--gold); color: var(--burgundy); border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; letter-spacing: 1px; margin-top: 10px; }
.msg { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 0.85rem; display: none; }
.msg.success { background: rgba(80,200,80,0.2); color: #90ee90; display: block; }
.msg.error { background: rgba(255,80,80,0.2); color: #ff9999; display: block; }
.warning { background: rgba(255,165,0,0.15); border: 1px solid rgba(255,165,0,0.4); border-radius: 10px; padding: 12px 16px; margin-bottom: 24px; color: rgba(255,200,100,0.9); font-size: 0.82rem; text-align: left; }
</style>
</head>
<body>
<div class="card">
  <h1>دار الكلمة</h1>
  <p>Configuration initiale — Enregistrement du compte professeur</p>

  <div class="warning">
    ⚠️ Cette page est à usage unique. Après avoir créé ton compte prof, supprime ce fichier de GitHub.
  </div>

  <div class="form-group">
    <label>Email professeur</label>
    <input type="email" id="email" placeholder="ton@email.com">
  </div>
  <div class="form-group">
    <label>Mot de passe (6 caractères minimum)</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <div class="form-group">
    <label>Ton prénom</label>
    <input type="text" id="nom" placeholder="Houda">
  </div>
  <button onclick="creerProf()">CRÉER LE COMPTE PROFESSEUR</button>
  <div id="msg" class="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBz5vRQUf4N7Px0YR4csyOlk72s1eOLLHQ",
  authDomain: "dar-al-kalimah.firebaseapp.com",
  projectId: "dar-al-kalimah",
  storageBucket: "dar-al-kalimah.firebasestorage.app",
  messagingSenderId: "472629258",
  appId: "1:472629258:web:29b755d38efe89421f1ff3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.creerProf = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const nom = document.getElementById('nom').value.trim();
  const msg = document.getElementById('msg');

  if (!email || !password || !nom) {
    msg.className = 'msg error';
    msg.textContent = '❌ Remplis tous les champs.';
    return;
  }

  try {
    // Créer le compte Firebase Auth
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: nom });

    // Ajouter dans la collection "profs"
    await setDoc(doc(db, 'profs', cred.user.uid), {
      nom: nom,
      email: email,
      dateCreation: serverTimestamp(),
      role: 'professeur'
    });

    msg.className = 'msg success';
    msg.textContent = `✅ Compte professeur créé ! UID : ${cred.user.uid} — Tu peux maintenant te connecter au dashboard. SUPPRIME ce fichier de GitHub.`;

  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = e.code === 'auth/email-already-in-use'
      ? '❌ Email déjà utilisé.'
      : '❌ Erreur : ' + e.message;
  }
};
</script>
</body>
</html>
