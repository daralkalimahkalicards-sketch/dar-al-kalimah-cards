<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Dar Al-Kalimah – Leçon 9 | الجملة الاسمية وأسماء الإشارة</title>
  <meta name="theme-color" content="#FAF6F0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{
      --burgundy:#5D1828;--burgundy-dark:#3a0f19;
      --gold:#C8A462;--gold-light:#dfc28b;
      --white:#FFFFFF;--bg-beige:#FAF6F0;
      --text-dark:#2C3E50;--text-soft:#8c775a;
      --shadow-soft:0 8px 25px rgba(93,24,40,0.06);
      --shadow-card:0 20px 50px rgba(93,24,40,0.10);
      --transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1);
      --radius-xl:28px;--radius-lg:22px;--radius-md:18px;--radius-sm:12px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
    body{min-height:100vh;min-height:100dvh;background:var(--bg-beige);font-family:"Montserrat",sans-serif;color:var(--text-dark);padding:16px 14px 50px;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(circle at 12% 18%,rgba(200,164,98,0.13),transparent 26%),radial-gradient(circle at 88% 12%,rgba(93,24,40,0.08),transparent 28%),radial-gradient(circle at 50% 92%,rgba(200,164,98,0.10),transparent 34%);}
    button,a{touch-action:manipulation;font:inherit;text-decoration:none;border:none;background:none;cursor:pointer;outline:none;}
    .ar{font-family:"Amiri",serif;direction:rtl;unicode-bidi:isolate;text-rendering:optimizeLegibility;font-feature-settings:"liga" 1,"calt" 1,"mark" 1,"mkmk" 1;line-height:1.7;}
    .serif{font-family:"Cinzel","Georgia",serif;}
    .hidden{display:none!important;}
    .view{width:100%;max-width:640px;display:flex;flex-direction:column;align-items:center;animation:up .38s ease-out;}
    @keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .gold{color:var(--gold);font-weight:700;}

    /* ── HEADER MENU ── */
    .menu-header{text-align:center;margin-bottom:28px;position:relative;width:100%;padding-top:8px;}
    .menu-brand-ar{font-size:3.8rem;color:var(--gold);margin-bottom:2px;line-height:1;}
    .menu-brand-sub{font-size:0.72rem;letter-spacing:5px;text-transform:uppercase;color:var(--burgundy);opacity:0.65;margin-bottom:12px;font-family:"Cinzel",serif;}
    .menu-title{font-size:1rem;color:var(--burgundy);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:2px;}
    .menu-title-sub{font-size:0.82rem;color:var(--burgundy);font-weight:600;margin-bottom:6px;}
    .menu-title-es{font-size:0.8rem;color:#999;letter-spacing:1.5px;text-transform:uppercase;}
    .menu-title-es-sub{font-size:0.72rem;color:#bbb;font-style:italic;}
    .btn-house-menu{position:absolute;top:8px;right:0;color:var(--gold);font-size:1.8rem;transition:var(--transition);border-radius:999px;background:transparent;border:none;}
    .btn-house-menu:hover{transform:scale(1.1);}

    /* ── CARTES THÈME ── */
    .theme-list{width:100%;display:flex;flex-direction:column;gap:22px;}
    .theme-card{background:var(--white);border:1px solid rgba(200,164,98,0.22);border-radius:var(--radius-xl);padding:36px 24px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;align-items:center;transition:var(--transition);width:100%;cursor:pointer;}
    .theme-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 16px 40px rgba(93,24,40,0.13);}
    .theme-card:active{transform:scale(0.98);}
    .theme-card.jomla-card{border-top:4px solid var(--burgundy);}
    .theme-card.icharah-card{border-top:4px solid var(--gold);}
    .theme-card.ensemble-card{border-top:4px solid #7b5ea7;}
    .theme-card.qiraa-card{border-top:4px solid var(--text-soft);}
    .theme-icon{font-size:3.5rem;color:var(--gold);margin-bottom:16px;}
    .theme-title-ar{font-size:2.4rem;color:var(--burgundy);font-weight:700;margin-bottom:14px;line-height:1.4;}
    .theme-divider{width:70px;height:2px;background:var(--gold);margin-bottom:12px;opacity:0.5;border-radius:2px;}
    .theme-title-fr{font-weight:700;font-size:1.1rem;color:var(--burgundy);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
    .theme-title-es{font-size:0.92rem;color:#888;font-style:italic;}

    /* ── TOP BAR ── */
    .lesson-top-bar{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;max-width:640px;}
    .pill-counter{background:var(--burgundy);color:var(--white);padding:8px 22px;border-radius:999px;font-weight:700;font-size:1.1rem;letter-spacing:1px;}
    .btn-back-lesson{color:var(--gold);font-size:1.8rem;transition:var(--transition);}

    /* ── FLIP CARD ── */
    .card-scene{width:100%;max-width:640px;perspective:1800px;margin-bottom:20px;}
    .card-flip{position:relative;width:100%;transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(0.4,0.2,0.2,1);cursor:pointer;height:clamp(560px,80dvh,720px);}
    .card-flip.flipped{transform:rotateY(180deg);}
    .card-face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--white);border-radius:var(--radius-xl);border:1px solid rgba(200,164,98,0.35);box-shadow:var(--shadow-card);padding:24px 20px 16px;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(200,164,98,0.3) transparent;}
    .card-face::-webkit-scrollbar{width:4px;}
    .card-face::-webkit-scrollbar-thumb{background:rgba(200,164,98,0.3);border-radius:2px;}
    .card-back-face{transform:rotateY(180deg);}

    /* Branding */
    .card-brand{text-align:center;margin-bottom:10px;}
    .card-brand-ar{font-size:1.8rem;color:var(--gold);line-height:1;margin-bottom:2px;}
    .card-brand-fr{font-size:0.62rem;color:var(--burgundy);letter-spacing:3px;text-transform:uppercase;opacity:0.65;}
    .card-sep{width:40px;height:1px;background:var(--gold);opacity:0.4;margin:10px auto;}

    /* Titres */
    .card-title-ar{font-size:clamp(1.8rem,5.5vw,2.6rem);color:var(--burgundy);font-weight:700;text-align:center;margin-bottom:4px;line-height:1.4;}
    .card-title-fr{font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:3px;}
    .card-title-es{font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--burgundy);opacity:0.55;font-style:italic;text-align:center;margin-bottom:12px;}
    .card-rule-ar{font-family:"Amiri",serif;direction:rtl;font-size:clamp(1.2rem,3.8vw,1.7rem);color:var(--burgundy);line-height:1.8;text-align:center;margin-bottom:12px;}
    .card-rule-fr{font-size:0.88rem;color:var(--text-dark);line-height:1.65;margin-bottom:5px;}
    .card-rule-es{font-size:0.8rem;color:var(--text-soft);font-style:italic;line-height:1.6;}
    .flip-hint{text-align:center;color:var(--gold);font-size:0.7rem;letter-spacing:1px;opacity:0.55;margin-top:14px;padding-top:8px;border-top:1px solid rgba(200,164,98,0.15);font-family:"Cinzel",serif;animation:pulse 2.5s infinite;flex-shrink:0;}
    @keyframes pulse{0%,100%{opacity:0.35;}50%{opacity:0.8;}}

    /* Schéma jomla */
    .jomla-schema{display:flex;justify-content:center;align-items:center;gap:24px;flex-wrap:wrap;margin:14px 0;padding:16px;background:var(--bg-beige);border-radius:var(--radius-md);border:1px dashed rgba(200,164,98,0.4);}
    .schema-box{display:flex;flex-direction:column;align-items:center;gap:6px;}
    .schema-ar{font-family:"Amiri",serif;direction:rtl;font-size:clamp(1.6rem,5vw,2.2rem);color:var(--burgundy);font-weight:700;line-height:1.2;}
    .schema-label{font-size:0.68rem;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:"Cinzel",serif;}
    .schema-label-es{font-size:0.62rem;color:var(--text-soft);font-style:italic;}
    .schema-plus{font-size:1.8rem;color:var(--gold-light);font-weight:300;align-self:center;}
    .schema-eq{font-size:1.5rem;color:var(--gold);font-weight:700;align-self:center;}

    /* Table ischarah */
    .icharah-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:0.85rem;}
    .icharah-table th{background:var(--burgundy);color:var(--white);padding:10px 8px;text-align:center;font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;font-family:"Cinzel",serif;}
    .icharah-table th:first-child{border-radius:8px 0 0 0;}
    .icharah-table th:last-child{border-radius:0 8px 0 0;}
    .icharah-table td{padding:12px 8px;text-align:center;border-bottom:1px solid rgba(200,164,98,0.18);}
    .icharah-table tr:last-child td{border-bottom:none;}
    .icharah-table tr:nth-child(even) td{background:rgba(200,164,98,0.06);}
    .icharah-table .td-ar{font-family:"Amiri",serif;direction:rtl;font-size:1.6rem;color:var(--burgundy);font-weight:700;font-feature-settings:"liga" 1,"calt" 1,"mark" 1,"mkmk" 1;}
    .icharah-table .td-fr{font-size:0.78rem;color:var(--text-dark);font-weight:600;}
    .icharah-table .td-es{font-size:0.72rem;color:var(--text-soft);font-style:italic;}

    /* Exemples flip */
    .example-block{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 0;border-bottom:1px solid rgba(200,164,98,0.18);text-align:center;}
    .example-block:last-child{border-bottom:none;padding-bottom:0;}
    .example-block:first-child{padding-top:0;}
    .ex-ar{font-family:"Amiri",serif;direction:rtl;font-size:clamp(1.8rem,6.5vw,2.6rem);color:var(--burgundy);font-weight:700;line-height:1.4;}
    .ex-ar .hi{color:var(--gold);}
    .ex-fr{font-size:0.9rem;color:var(--text-dark);font-weight:500;}
    .ex-es{font-size:0.8rem;color:var(--text-soft);font-style:italic;}
    .ex-analyse{font-size:0.75rem;color:var(--gold);font-family:"Cinzel",serif;letter-spacing:0.5px;margin-top:2px;}

    /* Lecture */
    .qiraa-legend{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin:0 0 10px;padding:8px 14px;background:rgba(200,164,98,0.08);border:1px solid rgba(200,164,98,0.2);border-radius:10px;font-size:0.72rem;}
    .legend-item{display:flex;align-items:center;gap:5px;font-family:"Cinzel",serif;font-size:0.64rem;letter-spacing:0.5px;}
    .legend-dot-ic{width:10px;height:10px;background:#7b5ea7;border-radius:50%;flex-shrink:0;}
    .legend-dot-mb{width:10px;height:10px;background:var(--burgundy);border-radius:50%;flex-shrink:0;}
    .legend-dot-kh{width:10px;height:10px;background:var(--gold);border:2px solid var(--gold);border-radius:50%;flex-shrink:0;}
    .qiraa-title-fr{font-size:0.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:10px;font-family:"Cinzel",serif;}
    .qiraa-text{font-family:"Amiri",serif;direction:rtl;font-size:clamp(1.4rem,4.5vw,1.9rem);color:var(--text-dark);line-height:2.3;text-align:center;width:100%;margin:6px 0;}
    .hl-ic{color:#7b5ea7;font-weight:700;}   /* اسم الإشارة — violet */
    .hl-mb{color:var(--burgundy);font-weight:700;text-decoration:underline;text-decoration-color:rgba(93,24,40,0.3);text-underline-offset:4px;} /* مبتدأ */
    .hl-kh{color:#8a6620;font-weight:700;}   /* خبر — doré foncé */

    /* NAV */
    .nav-controls{display:flex;justify-content:space-between;gap:14px;width:100%;max-width:640px;}
    .btn-nav{flex:1;padding:16px 14px;border-radius:999px;font-weight:700;font-size:0.92rem;text-transform:uppercase;letter-spacing:1.5px;transition:var(--transition);display:flex;justify-content:center;align-items:center;gap:10px;background:var(--white);border:1px solid rgba(200,164,98,0.45);color:var(--burgundy);box-shadow:var(--shadow-soft);min-height:50px;}
    .btn-nav:hover{background:var(--burgundy);color:var(--white);border-color:var(--burgundy);transform:translateY(-2px);}
    .btn-nav:disabled{opacity:0.35;pointer-events:none;}

    @media(max-width:480px){
      .card-flip{height:clamp(520px,78dvh,660px);}
      .card-face{padding:18px 14px 12px;}
      .card-brand-ar{font-size:1.5rem;}
      .btn-nav{font-size:0.8rem;padding:13px 8px;}
      .icharah-table .td-ar{font-size:1.3rem;}
    }

    .quiz-num{font-size:.7rem;color:var(--gold);font-family:"Cinzel",serif;letter-spacing:2px;text-align:center;margin-bottom:8px;opacity:.7;}
    .quiz-q-ar{font-family:"Amiri",serif;direction:rtl;font-size:clamp(1.3rem,4.3vw,1.8rem);color:var(--burgundy);font-weight:700;line-height:1.8;text-align:center;font-feature-settings:"liga" 1,"calt" 1,"mark" 1,"mkmk" 1;}
    .quiz-q-fr{font-size:.9rem;color:var(--text-dark);text-align:center;margin-bottom:4px;}
    .quiz-q-es{font-size:.82rem;color:var(--text-soft);font-style:italic;text-align:center;}
    .quiz-btns{display:flex;gap:14px;justify-content:center;margin:0 0 16px;}
    .quiz-btn{flex:1;max-width:140px;padding:14px 10px;border-radius:999px;font-weight:700;font-size:1rem;letter-spacing:1px;border:2px solid;cursor:pointer;transition:all .25s;font-family:"Montserrat",sans-serif;}
    .quiz-btn-oui{background:rgba(93,24,40,.06);border-color:var(--burgundy);color:var(--burgundy);}
    .quiz-btn-non{background:rgba(200,164,98,.08);border-color:var(--gold);color:#8a6620;}
    .quiz-btn:disabled{opacity:.4;pointer-events:none;}
    .quiz-feedback{border-radius:16px;padding:14px 16px;margin-top:4px;font-size:.88rem;line-height:1.6;text-align:center;display:none;}
    .quiz-feedback.correct{background:rgba(34,139,34,.08);border:1px solid rgba(34,139,34,.25);color:#1a6b1a;}
    .quiz-feedback.wrong{background:rgba(200,30,30,.07);border:1px solid rgba(200,30,30,.2);color:#9b1a1a;}
    .quiz-feedback.show{display:block;}

    /* MCQ buttons */
    .mcq-btn{width:100%;padding:12px 16px;border-radius:var(--radius-md,18px);font-weight:600;font-size:0.9rem;cursor:pointer;border:2px solid var(--gold-light,#dfc28b);background:#fff;color:var(--burgundy);transition:all .25s;text-align:right;direction:rtl;}
    .mcq-btn:hover{border-color:var(--gold);background:rgba(200,164,98,0.06);}
    .mcq-btn:disabled{cursor:default;}
    .mcq-btn.mcq-correct{border:2px solid #4CAF50!important;background:var(--success-green,#e8f5e9);color:#2e7d32;}
    .mcq-btn.mcq-wrong{border:2px solid #f44336!important;background:var(--error-red,#ffebee);opacity:0.7;}

        /* Guard auth */
        body { visibility: hidden; }
  </style>

  </script>
</head>

<main id="view-select" class="view">

      <div class="theme-divider"></div>
      <div class="theme-title-fr">La Phrase Nominale</div>

      <i class="fa-solid fa-hand-pointer theme-icon"></i>

      <div class="theme-title-fr">Les Démonstratifs</div>

    <button class="theme-card ensemble-card" onclick="openSection('ensemble')">

    </button>
    <button class="theme-card qiraa-card" onclick="openSection('qiraa')">
      <i class="fa-solid fa-book-open theme-icon" style="color:var(--text-soft);"></i>
      <div class="theme-title-ar ar" style="font-size:1.8rem;">تَعْزِيزُ الْقِرَاءَة</div>
      <div class="theme-divider" style="background:var(--text-soft);"></div>

  </div>
</main>

<main id="view-jomla" class="view hidden">
  <div class="lesson-top-bar">
    <div class="pill-counter"><span id="jomla-curr">1</span> / <span id="jomla-tot">3</span></div>
    <button class="btn-back-lesson" onclick="goHome()"><i class="fa-solid fa-house"></i></button>
  </div>

    <div class="card-flip" id="card-jomla" onclick="flipCard('jomla')">
      <div class="card-face" id="jomla-front"></div>

    </div>
  </div>
  <nav class="nav-controls">
    <button class="btn-nav" id="jomla-prev" onclick="navigate('jomla',-1)" disabled><i class="fa-solid fa-arrow-left"></i> Préc.</button>

<!-- ══════════════════════════════════════
     VUE 3 — أسماء الإشارة

<main id="view-icharah" class="view hidden">
  <div class="lesson-top-bar">
    <div class="pill-counter"><span id="icharah-curr">1</span> / <span id="icharah-tot">8</span></div>
    <button class="btn-back-lesson" onclick="goHome()"><i class="fa-solid fa-house"></i></button>
  </div>
  <div class="card-scene">
    <div class="card-flip" id="card-icharah" onclick="flipCard('icharah')">
      <div class="card-face" id="icharah-front"></div>
      <div class="card-face card-back-face" id="icharah-back"></div>
    </div>
  </div>
  <nav class="nav-controls">

  icharah:  {idx:0, flipped:false},
  ensemble: {idx:0, flipped:false},
  qiraa:    {idx:0, flipped:false}

const $=id=>document.getElementById(id);
const views={
  select:   $("view-select"),
  jomla:    $("view-jomla"),
  icharah:  $("view-icharah"),
  ensemble: $("view-ensemble"),
  qiraa:    $("view-qiraa")
};

function showView(name){
  Object.values(views).forEach(v=>v.classList.add("hidden"));
  views[name].classList.remove("hidden");
}

  const s=State[section];
  const cards=DATA[section];

    html+='<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0 14px;">';
    html+='<span style="font-family:Amiri,serif;font-size:2rem;color:var(--gold);direction:rtl;font-weight:700;">'+adat+'</span>';
    html+='<span style="font-size:0.7rem;color:#aaa;font-family:Cinzel,serif;letter-spacing:1px;">'+(card.adat_fr||'')+'</span>';
    html+='</div>';
    html+='<div class="quiz-q-ar ar" style="margin:0 0 14px;">'+card.ar+'</div>';
    html+='<div class="quiz-q-fr" style="margin-bottom:4px;">'+card.fr+'</div>';
    html+='<div class="quiz-q-es" style="margin-bottom:18px;">'+card.es+'</div>';
    html+='<div style="display:flex;flex-direction:column;gap:10px;width:100%;margin-bottom:14px;">';
    card.opts.forEach(function(opt,i){
      html+='<button class="mcq-btn" onclick="answerMCQ(\''+section+'\','+i+')" data-idx="'+i+'">';
      html+='<span style="font-family:Amiri,serif;direction:rtl;font-size:clamp(1rem,3.5vw,1.3rem);font-feature-settings:\'liga\' 1,\'calt\' 1,\'mark\' 1,\'mkmk\' 1;">'+opt+'</span>';
      html+='</button>';
    });
    html+='</div>';
    html+='<div class="quiz-feedback" id="qfb-'+section+'"></div>';
    $(section+"-front").innerHTML=html;
    $(section+"-back").innerHTML='';
  } else if(card.type==='quiz'){
    flip.onclick=null;
    flip.style.cursor='default';
    var html='<div class="card-brand" style="margin-bottom:10px;">';
    html+='<div class="card-brand-ar ar" style="font-size:2rem;">\u062f\u0627\u0631 \u0627\u0644\u0643\u0644\u0645\u0629</div>';
    html+='<div class="card-brand-fr serif" style="font-size:0.85rem;letter-spacing:2px;color:var(--burgundy);opacity:0.8;">\u062a\u064e\u0639\u0652\u0632\u064a\u0632\u064f \u0627\u0644\u0652\u0642\u0650\u0631\u064e\u0627\u0621\u064e\u0629</div>';
    html+='</div><div class="card-sep"></div>';
    html+='<div class="quiz-num" style="margin:18px 0 18px;">QUESTION '+card.num+' / 10 &nbsp;&middot;&nbsp; PREGUNTA '+card.num+' / 10</div>';
    html+='<div class="quiz-q-ar ar" style="margin:0 0 20px;">'+card.ar+'</div>';
    html+='<div class="quiz-q-fr" style="margin-bottom:8px;">'+card.fr+'</div>';
    html+='<div class="quiz-q-es" style="margin-bottom:28px;">'+card.es+'</div>';
    html+='<div class="quiz-btns" style="margin-bottom:20px;">';
    html+='<button class="quiz-btn quiz-btn-oui" onclick="answerQuiz(\''+section+'\',true)">\u0646\u064e\u0639\u0645<br><small>Oui &middot; S&iacute;</small></button>';
    html+='<button class="quiz-btn quiz-btn-non" onclick="answerQuiz(\''+section+'\',false)">\u0644\u064e\u0627<br><small>Non &middot; No</small></button>';
    html+='</div><div class="quiz-feedback" id="qfb-'+section+'"></div>';
    $(section+"-front").innerHTML=html;
    $(section+"-back").innerHTML='';
  } else {
    flip.onclick=function(){flipCard(section);};
    flip.style.cursor='pointer';
    $(section+"-front").innerHTML=card.front;
    $(section+"-back").innerHTML=card.back;
  }

  $(section+"-curr").textContent=s.idx+1;
  if($(section+"-tot"))$(section+"-tot").textContent=cards.length;
  $(section+"-prev").disabled=(s.idx===0);
  $(section+"-next").disabled=(s.idx===cards.length-1);
  // DAK Tracker — dernière section 'qiraa'
  console.log("DAK DEBUG L9 renderSection — section:", section, "| idx:", s.idx, "| last:", cards.length-1, "| DAK:", typeof window.DAK_enregistrerLecon);
  if(section==='qiraa'&&s.idx===cards.length-1){
    console.log("DAK DEBUG L9 — DERNIERE CARTE QIRAA ✅ — total cards:", cards.length);
    enrLecon9(cards.length);
  }
  $(section+"-front").scrollTop=0;
  $(section+"-back").scrollTop=0;
}



window.answerMCQ=function(section,chosen){
  var card=DATA[section][State[section].idx];
  var fb=document.getElementById('qfb-'+section);
  var correct=(chosen===card.correct);
  document.querySelectorAll('#view-'+section+' .mcq-btn').forEach(function(b){b.disabled=true;});
  var chosenBtn=document.querySelector('#view-'+section+' .mcq-btn[data-idx="'+chosen+'"]');
  var correctBtn=document.querySelector('#view-'+section+' .mcq-btn[data-idx="'+card.correct+'"]');
  if(correct){
    chosenBtn.classList.add('mcq-correct');
  } else {
    chosenBtn.classList.add('mcq-wrong');
    if(correctBtn)correctBtn.classList.add('mcq-correct');
  }
  fb.className='quiz-feedback show '+(correct?'correct':'wrong');
  var ar=correct?card.fb_ok_ar:card.fb_ko_ar;
  var fr=correct?card.fb_ok_fr:card.fb_ko_fr;
  var es=correct?card.fb_ok_es:card.fb_ko_es;
  fb.innerHTML='<div style="font-family:Amiri,serif;font-size:1.05rem;direction:rtl;margin-bottom:6px;">'+ar+'</div><div style="margin-bottom:4px;font-weight:600;">'+fr+'</div><em>'+es+'</em>';
};
window.answerQuiz=function(section,chosen){
  var card=DATA[section][State[section].idx];
  var fb=document.getElementById('qfb-'+section);
  var correct=(chosen===card.answer);
  document.querySelectorAll('#view-'+section+' .quiz-btn').forEach(function(b){b.disabled=true;});
  fb.className='quiz-feedback show '+(correct?'correct':'wrong');
  var ar=correct?card.ok_ar:card.ko_ar;
  var fr=correct?card.ok_fr:card.ko_fr;
  var es=correct?card.ok_es:card.ko_es;
  fb.innerHTML='<div style="font-family:Amiri,serif;font-size:1.05rem;direction:rtl;margin-bottom:6px;">'+ar+'</div><div style="margin-bottom:4px;font-weight:600;">'+fr+'</div><em>'+es+'</em>';
};
window.openSection=function(section){
  State[section].idx=0;
  State[section].flipped=false;
  renderSection(section);
  showView(section);
};

window.goHome=function(){showView("select");};

window.flipCard=function(section){
  State[section].flipped=!State[section].flipped;
  $("card-"+section).classList.toggle("flipped",State[section].flipped);
};


    // DAK Tracker — anti-doublon
    var _enrLecon9Enregistree = false;
    function enrLecon9(cartesTotal) {
        if (_enrLecon9Enregistree) return;
        if (window.DAK_enregistrerLecon) {
            _enrLecon9Enregistree = true;
            console.log('DAK DEBUG L9 — total envoyé:', cartesTotal);
            window.DAK_enregistrerLecon({ module: 'Module 9', lecon: 'Leçon 9', total: cartesTotal });
            return;
        }
        var _t = 0;
        var _iv = setInterval(function() {
            _t++;
            if (window.DAK_enregistrerLecon && !_enrLecon9Enregistree) {
                _enrLecon9Enregistree = true;
                clearInterval(_iv);
                console.log('DAK DEBUG L9 RETRY interval — total:', cartesTotal);
                window.DAK_enregistrerLecon({ module: 'Module 9', lecon: 'Leçon 9', total: cartesTotal });
            } else if (_t >= 15) { clearInterval(_iv); }
        }, 200);
    }
    window.navigate=function(section,dir){
  console.log("DAK DEBUG L9 navigate — section:", section, "dir:", dir);
  const s=State[section];
  const next=s.idx+dir;
  if(next<0||next>=DATA[section].length)return;
  s.idx=next;
  renderSection(section);
};

/* Swipe */
["jomla","icharah","ensemble","qiraa"].forEach(section=>{
  let tx=0;
  const el=$("view-"+section);
  el.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
  el.addEventListener("touchend",e=>{
    const dx=tx-e.changedTouches[0].clientX;
    if(Math.abs(dx)>55){dx>0?navigate(section,1):navigate(section,-1);}
  },{passive:true});
});

})();
</script>
