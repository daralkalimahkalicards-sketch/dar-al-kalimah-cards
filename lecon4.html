        "customAlign": "center",
        "nounRuleTemplate": "wasl-prononciation-rules",

          { "word": "ٱكْـ<span class='gold-mark'>تُـ</span>بْ", "transFr": "3ème lettre Damma (ُ) → OU (Uktub)", "transEs": "3ra letra Damma (ُ) → U (Uktub)" },
          { "word": "ٱفْـ<span class='gold-mark'>تَـ</span>حْ", "transFr": "3ème lettre Fatha (َ) → I (Iftah)", "transEs": "3ra letra Fatha (َ) → I (Iftah)" },

  <script>
    (() => {
      "use strict";

      const DATA = JSON.parse(document.getElementById("app-data").textContent);
      const $ = (id) => document.getElementById(id);

      const DOM = {
        currentIndex: $("current-index"),
        totalCards: $("total-cards"),
        flashcard: $("flashcard"),
        frontFace: $("front-face"),
        backFace: $("back-face"),
        btnPrev: $("btn-prev"),
        btnNext: $("btn-next"),
        btnHome: $("btn-home")
      };

      const AudioController = {
        player: new Audio(),
        currentBtn: null,
        isUnlocked: false,

        init() {
          this.player.preload = "auto";
          this.player.playsInline = true;
          this.player.volume = 1;
          this.player.addEventListener("ended", () => this.resetPlayingState());
          this.player.addEventListener("pause", () => this.resetPlayingState());
        },

        async unlock() {
          if (this.isUnlocked) return true;
          try {
            this.player.muted = true;
            await this.player.play().catch(() => {});
            this.player.pause();
            this.player.currentTime = 0;
            this.player.muted = false;
            this.isUnlocked = true;
            return true;
          } catch (_) {
            this.player.muted = false;
            return false;
          }
        },

        async play(src, btn = null) {
          if (!src) return false;
          try {
            await this.unlock();
            this.resetPlayingState();
            this.currentBtn = btn;
            if (this.currentBtn) this.currentBtn.classList.add("is-playing");
            this.player.pause();
            this.player.currentTime = 0;
            this.player.src = src;
            this.player.load();
            await this.player.play();
            return true;
          } catch (err) {
            console.warn("Audio non lu :", src, err);
            this.resetPlayingState();
            return false;
          }
        },

        pause() {
          this.player.pause();
          this.resetPlayingState();
        },

        resetPlayingState() {
          if (this.currentBtn) {
            this.currentBtn.classList.remove("is-playing");
            this.currentBtn = null;
          }
        }
      };

      const PWAController = {
        ensureManifest() {
          if (document.querySelector('link[rel="manifest"]')) return;
          const pwa = DATA.meta.pwa;
          if (!pwa) return;
          try {
            const manifest = {
              name: pwa.appName || "Dar Al-Kalimah",
              short_name: pwa.shortName || "Kalicards",
              start_url: pwa.startUrl || "./",
              display: pwa.display || "standalone",
              background_color: pwa.backgroundColor || "#FAF6F0",
              theme_color: pwa.themeColor || "#5D1828",
              icons: [
                { src: pwa.icon192 || "icon-192x192.png", sizes: "192x192", type: "image/png" },
                { src: pwa.icon512 || "icon-512x512.png", sizes: "512x512", type: "image/png" }
              ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
            const link = document.createElement("link");
            link.rel = "manifest";
            link.href = URL.createObjectURL(blob);
            document.head.appendChild(link);
          } catch (_) {}
        }
      };

      const Templates = {
        audioBtn(audioKey = "", extraStyle = "", title = "Écouter") {
          return `<button class="btn-audio-small" data-audio-key="${audioKey}" style="${extraStyle}" onclick="event.stopPropagation(); App.handleAudioBtn(event, this);" title="${title}" aria-label="${title}">🎙️</button>`;
        },

        "tanwin-signs": () => `
          <div style='display:grid;grid-template-columns:auto auto auto;gap:40px;justify-content:center;align-items:baseline;text-align:center;margin:10px auto 35px auto;direction:rtl;max-width:100%;min-width:max-content;'>
            <span class='gold-mark' style='font-size:5.5rem;line-height:1;grid-row:1;grid-column:1;'>◌ًا</span>
            <span class='gold-mark' style='font-size:5.5rem;line-height:1;grid-row:1;grid-column:2;'>◌ٌ</span>
            <span class='gold-mark' style='font-size:5.5rem;line-height:1;grid-row:1;grid-column:3;'>◌ٍ</span>
            <div style="grid-row:2;grid-column:1;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("tanwin-fath")}</div>
            <div style="grid-row:2;grid-column:2;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("tanwin-damm")}</div>
            <div style="grid-row:2;grid-column:3;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("tanwin-kasr")}</div>
          </div>
          <div style='font-size:1.6rem;color:var(--burgundy);line-height:1.7;overflow-wrap:anywhere;'>
            يُضَافُ (ا) مَعَ تَنْوِينِ الفَتْحِ دَائِمًا، <strong style='color:var(--gold);'>مَا عَدَا :</strong> الكَلِمَاتِ الْمُنْتَهِيَةِ بِـ (ة) أَوْ (اء)
          </div>`,

        "hamza-forms": () => `
          <div style='display:grid;grid-template-columns:auto auto auto auto auto auto auto auto auto;gap:20px;justify-content:center;align-items:baseline;margin-top:20px;direction:rtl;max-width:100%;min-width:max-content;'>
            <span class='gold-mark' style='font-size:3.5rem;line-height:1;grid-row:1;grid-column:1;'>أَ</span>
            <div style='width:2px;height:45px;background-color:var(--burgundy);border-radius:2px;opacity:0.4;grid-row:1;grid-column:2;align-self:center;'></div>
            <span class='gold-mark' style='font-size:3.5rem;line-height:1;grid-row:1;grid-column:3;'>إِ</span>
            <div style='width:2px;height:45px;background-color:var(--burgundy);border-radius:2px;opacity:0.4;grid-row:1;grid-column:4;align-self:center;'></div>
            <span class='gold-mark' style='font-size:3.5rem;line-height:1;grid-row:1;grid-column:5;'>ؤُ</span>
            <div style='width:2px;height:45px;background-color:var(--burgundy);border-radius:2px;opacity:0.4;grid-row:1;grid-column:6;align-self:center;'></div>
            <span class='gold-mark' style='font-size:3.5rem;line-height:1;grid-row:1;grid-column:7;'>ئِ</span>

            <span class='gold-mark' style='font-size:3.5rem;line-height:1;grid-row:1;grid-column:9;'>ءَ</span>
            <div style="grid-row:2;grid-column:1;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("hamza-alif")}</div>
            <div style="grid-row:2;grid-column:3;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("hamza-under-alif")}</div>
            <div style="grid-row:2;grid-column:5;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("hamza-waw")}</div>
            <div style="grid-row:2;grid-column:7;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("hamza-ya")}</div>

          </div>`,

        "voyelle-hierarchy": () => `
          <div style='display:grid;grid-template-columns:auto auto auto auto auto auto auto;gap:25px;justify-content:center;align-items:baseline;direction:ltr;font-weight:bold;margin-top:15px;max-width:100%;min-width:max-content;'>
            <span style='font-size:4.5rem;color:var(--gold);line-height:1;grid-row:1;grid-column:1;'>◌ِ</span>
            <span style='font-size:2.5rem;color:var(--text-soft);font-family:"Montserrat",sans-serif;grid-row:1;grid-column:2;'>&gt;</span>
            <span style='font-size:4.5rem;color:var(--gold);line-height:1;grid-row:1;grid-column:3;'>◌ُ</span>
            <span style='font-size:2.5rem;color:var(--text-soft);font-family:"Montserrat",sans-serif;grid-row:1;grid-column:4;'>&gt;</span>
            <span style='font-size:4.5rem;color:var(--gold);line-height:1;grid-row:1;grid-column:5;'>◌َ</span>
            <span style='font-size:2.5rem;color:var(--text-soft);font-family:"Montserrat",sans-serif;grid-row:1;grid-column:6;'>&gt;</span>
            <span style='font-size:4.5rem;color:var(--gold);line-height:1;grid-row:1;grid-column:7;'>◌ْ</span>
            <div style="grid-row:2;grid-column:1;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("kasra")}</div>
            <div style="grid-row:2;grid-column:3;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("damma")}</div>
            <div style="grid-row:2;grid-column:5;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("fatha")}</div>
            <div style="grid-row:2;grid-column:7;display:flex;justify-content:center;margin-top:10px;">${Templates.audioBtn("sukoun")}</div>
          </div>
          <div style='font-size:1.6rem;margin-top:30px;color:var(--burgundy);display:flex;flex-direction:column;gap:15px;align-items:center;'>
            <div style='display:flex;align-items:center;gap:15px;direction:rtl;flex-wrap:wrap;justify-content:center;'>
              <span>الكَسْرَةُ تُعْطِي (<span class='gold-mark'>ئِـ</span>)</span>
              ${Templates.audioBtn("chair-ya", "width:38px;height:38px;font-size:1.1rem;")}

              <span>الضَّمَّةُ تُعْطِي (<span class='gold-mark'>ؤُ</span>)</span>
              ${Templates.audioBtn("chair-waw", "width:38px;height:38px;font-size:1.1rem;")}
            </div>
            <div style='display:flex;align-items:center;gap:15px;direction:rtl;flex-wrap:wrap;justify-content:center;'>
              <span>الفَتْحَةُ تُعْطِي (<span class='gold-mark'>أَ</span>)</span>
              ${Templates.audioBtn("chair-alif", "width:38px;height:38px;font-size:1.1rem;")}
            </div>
          </div>`,

        "hamza-milieu-rule": () => `<div style='font-size:1.8rem;color:var(--burgundy);line-height:1.7;overflow-wrap:anywhere;'>الحَرَكَةُ الأَقْوَى هِيَ الَّتِي تَفُوزُ وَتُحَدِّدُ الكُرْسِيّ!</div>`,

        "hamza-fin-rule": () => `<div style='font-size:1.8rem;color:var(--burgundy);line-height:1.7;overflow-wrap:anywhere;'>حَرَكَةُ الهَمْزَةِ نَفْسِهَا لَا تُهِمُّ هُنَا!</div>`,

        "hamzat-wasl-sign": () => `
          <div style='display:flex;flex-direction:column;align-items:center;gap:20px;margin-top:15px;'>
            <span class='gold-mark' style='font-size:5rem;line-height:1;'>ٱ</span>
            ${Templates.audioBtn("wasl-sign")}
          </div>`,

        "wasl-prononciation-rules": () => `
          <div style='font-size:1.4rem;color:var(--burgundy);line-height:1.6;display:flex;flex-direction:column;align-items:center;gap:12px;direction:rtl;'>
            <div style='display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap;'>
              <span><span style='color:var(--gold);'>•</span> مَعَ (ال) ← <span class='gold-mark'>فَتْحَة (◌َ)</span></span>
              ${Templates.audioBtn("wasl-al", "width:36px;height:36px;font-size:1.1rem;")}
            </div>
            <div style='display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap;'>
              <span><span style='color:var(--gold);'>•</span> فِي ٱسْم، ٱبْن ← <span class='gold-mark'>كَسْرَة (◌ِ)</span></span>
              ${Templates.audioBtn("wasl-ism-ibn", "width:36px;height:36px;font-size:1.1rem;")}
            </div>
            <div style='text-align:center;'>
              <span><span style='color:var(--gold);'>•</span> فِي الأَفْعَال ← <span class='gold-mark'>نَنْظُرُ لِلْحَرْفِ الثَّالِثِ :</span></span>
            </div>
            <div style='display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap;'>
              <span>فَتْحَة (◌َ) أَوْ كَسْرَة (◌ِ) = نَنْطِقُ <strong style='font-size:1.6rem;'>(إِ)</strong></span>
              ${Templates.audioBtn("wasl-verbs-i", "width:36px;height:36px;font-size:1.1rem;")}
            </div>
            <div style='display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap;'>
              <span>ضَمَّة (◌ُ) = نَنْطِقُ <strong style='font-size:1.6rem;'>(أُ)</strong></span>
              ${Templates.audioBtn("wasl-verbs-u", "width:36px;height:36px;font-size:1.1rem;")}
            </div>
          </div>`,

        "wasl-exemples-sign": () => `
          <div style='display:flex;flex-direction:column;align-items:center;gap:20px;margin-top:20px;'>
            <span class='gold-mark' style='font-size:4rem;line-height:1;'>ٱ</span>
            ${Templates.audioBtn("wasl-sign")}
          </div>`,

        render(templateId) {
          const fn = this[templateId];
          return typeof fn === "function" ? fn() : "";
        }
      };

      const App = {
        state: {
          currentIndex: 0,
          isFlipped: false,
          total: DATA.lessonData.length,
          globalHeight: 420
        },

        init() {
          AudioController.init();
          PWAController.ensureManifest();
          document.title = DATA.meta.pageTitle;
          DOM.btnHome.href = DATA.meta.homeHref;
          DOM.totalCards.textContent = this.state.total;
          DOM.flashcard.style.height = `${this.state.globalHeight}px`;
          this.renderCard(0);
          this.bindEvents();

          const compute = () => this.computeGlobalHeight();
          if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(compute);
          } else {
            setTimeout(compute, 400);
          }

          window.addEventListener("resize", () => {
            clearTimeout(this.resizeTimer);
            this.resizeTimer = setTimeout(() => this.computeGlobalHeight(), 200);
          });
        },

        computeGlobalHeight() {
          const flashcardWidth = DOM.flashcard.offsetWidth || DOM.flashcard.parentElement.offsetWidth || 800;
          const probe = document.createElement("div");
          probe.style.cssText = `
            position: absolute;
            visibility: hidden;
            pointer-events: none;
            left: -9999px;
            top: 0;
            width: ${flashcardWidth}px;
          `;
          document.body.appendChild(probe);

          let maxH = 0;

          for (const data of DATA.lessonData) {
            const titleEsHtml = data.titleEs
              ? ` <span style="color:var(--gold); margin:0 10px;">•</span> ${data.titleEs}`
              : "";
            const alignCustom = data.customAlign || "left";
            const nounRuleHtml = Templates.render(data.nounRuleTemplate);

            const front = document.createElement("div");
            front.className = "card-face";
            front.style.cssText = "position:relative;transform:none;height:auto;";
            front.innerHTML = `
              <div class="card-branding">
                <div class="brand-ar-top ar-text">${DATA.meta.brandAr}</div>
                <div class="brand-fr serif-text">${DATA.meta.brandFr}</div>
                <div class="cb-line"></div>
              </div>
              <div class="content-wrap">
                <div class="module-title-group">
                  <h1 class="ar-module-title">${data.titleAr}</h1>
                  <h2 class="fr-module-title">${data.titleFr}${titleEsHtml}</h2>
                </div>
                <hr class="elegant-separator">
                <div class="rules-stack">
                  <div class="main-rule-ar ar-text" style="text-align:center;">${data.ruleAr}</div>
                  <div class="main-rule-ar ar-text" style="font-size:1.8rem;"><div class="inline-rich-wrap">${nounRuleHtml}</div></div>
                  <hr class="elegant-separator" style="margin:10px auto 20px auto;">
                  <div style="width:100%;padding:0 10px;">
                    <div class="main-rule-fr" style="color:var(--text-dark);text-align:${alignCustom};">${data.ruleFr}</div>
                    <div style="width:60px;height:1px;background-color:var(--gold);margin:20px auto;opacity:0.4;"></div>
                    <div class="main-rule-es" style="color:var(--text-soft);text-align:${alignCustom};">${data.ruleEs}</div>
                  </div>
                </div>
              </div>`;

            const back = document.createElement("div");
            back.className = "card-face";
            back.style.cssText = "position:relative;transform:none;height:auto;";
            const examplesHtml = data.examples.map(ex => `
              <div class="example-block">
                <div class="example-word-ar ar-text">${ex.word}</div>
                <div class="latin-example-trans">
                  <span class="trans-fr">${ex.transFr}</span>
                  <span class="trans-es">${ex.transEs}</span>
                </div>
              </div>`).join("");
            back.innerHTML = `
              <div class="card-branding">
                <div class="brand-ar-top ar-text">${DATA.meta.brandAr}</div>
                <div class="brand-fr serif-text">${DATA.meta.brandFr}</div>
                <div class="cb-line"></div>
              </div>
              <div class="examples-wrapper">${examplesHtml}</div>`;

            probe.appendChild(front);
            probe.appendChild(back);
            maxH = Math.max(maxH, front.scrollHeight, back.scrollHeight);
            probe.removeChild(front);
            probe.removeChild(back);
          }

          document.body.removeChild(probe);
          this.state.globalHeight = Math.max(maxH, 420);
          DOM.flashcard.style.height = `${this.state.globalHeight}px`;
        },

        renderCard(index) {
          const data = DATA.lessonData[index];
          DOM.currentIndex.textContent = index + 1;
          AudioController.pause();

          const doRender = () => {
            this.updateFront(data);
            this.updateBack(data);
            DOM.flashcard.style.height = `${this.state.globalHeight}px`;
          };

          if (this.state.isFlipped) {
            DOM.flashcard.classList.remove("is-flipped");
            this.state.isFlipped = false;
            setTimeout(doRender, 350);
          } else {
            doRender();
          }

          DOM.btnPrev.disabled = index === 0;
          DOM.btnNext.disabled = index === this.state.total - 1;
        },

        updateFront(data) {
          const titleEsHtml = data.titleEs
            ? ` <span style="color:var(--gold); margin:0 10px;">•</span> ${data.titleEs}`
            : "";
          const alignCustom = data.customAlign || "left";
          const nounRuleHtml = Templates.render(data.nounRuleTemplate);

          DOM.frontFace.innerHTML = `
            <div class="card-branding">
              <div class="brand-ar-top ar-text">${DATA.meta.brandAr}</div>
              <div class="brand-fr serif-text">${DATA.meta.brandFr}</div>
              <div class="cb-line"></div>
            </div>
            <div class="content-wrap">
              <div class="module-title-group">
                <h1 class="ar-module-title">${data.titleAr}</h1>
                <h2 class="fr-module-title">${data.titleFr}${titleEsHtml}</h2>
              </div>
              <hr class="elegant-separator">
              <div class="rules-stack">
                <div class="main-rule-ar ar-text" style="text-align:center;">${data.ruleAr}</div>
                <div class="main-rule-ar ar-text" style="font-size:1.8rem;">
                  <div class="inline-rich-wrap">${nounRuleHtml}</div>
                </div>
                <hr class="elegant-separator" style="margin:10px auto 20px auto;">
                <div style="width:100%;padding:0 10px;">
                  <div class="main-rule-fr" style="color:var(--text-dark);text-align:${alignCustom};">${data.ruleFr}</div>
                  <div style="width:60px;height:1px;background-color:var(--gold);margin:20px auto;opacity:0.4;"></div>
                  <div class="main-rule-es" style="color:var(--text-soft);text-align:${alignCustom};">${data.ruleEs}</div>
                </div>
              </div>
            </div>`;
        },

        updateBack(data) {
          const examplesHtml = data.examples.map(ex => `
            <div class="example-block">
              <div class="example-word-ar ar-text">${ex.word}</div>
              <div class="latin-example-trans">
                <span class="trans-fr">${ex.transFr}</span>
                <span class="trans-es">${ex.transEs}</span>
              </div>
            </div>`).join("");

          DOM.backFace.innerHTML = `
            <div class="card-branding">
              <div class="brand-ar-top ar-text">${DATA.meta.brandAr}</div>
              <div class="brand-fr serif-text">${DATA.meta.brandFr}</div>
              <div class="cb-line"></div>
            </div>
            <div class="examples-wrapper">${examplesHtml}</div>`;
        },

        toggleFlip() {
          if (!DATA.settings.enableFlip) return;
          this.state.isFlipped = !this.state.isFlipped;
          DOM.flashcard.classList.toggle("is-flipped");
          if (!this.state.isFlipped) AudioController.pause();
        },

        handleAudioBtn(event, btn) {
          event.stopPropagation();
          if (!DATA.settings.enableAudio) return;
          const audioKey = btn.dataset.audioKey || "";
          const src = DATA.audioMap[audioKey] || "";
          if (!src) return;
          AudioController.play(src, btn);
        },

        nextCard() {
          if (this.state.currentIndex < this.state.total - 1) {
            this.state.currentIndex++;
            this.renderCard(this.state.currentIndex);
          }
        },

        prevCard() {
          if (this.state.currentIndex > 0) {
            this.state.currentIndex--;
            this.renderCard(this.state.currentIndex);
          }
        },

        bindEvents() {
          DOM.flashcard.addEventListener("click", () => this.toggleFlip());

          DOM.flashcard.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              this.toggleFlip();
            }
          });

          DOM.btnNext.addEventListener("click", (e) => {
            e.stopPropagation();
            this.nextCard();
          });

          DOM.btnPrev.addEventListener("click", (e) => {
            e.stopPropagation();
            this.prevCard();
          });

          let touchStartX = 0;
          let touchStartY = 0;

          DOM.flashcard.addEventListener("touchstart", (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
          }, { passive: true });

          DOM.flashcard.addEventListener("touchend", (e) => {
            const dx = touchStartX - e.changedTouches[0].clientX;
            const dy = touchStartY - e.changedTouches[0].clientY;
            if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
              if (dx > 0) this.nextCard();
              else this.prevCard();
            }
          }, { passive: true });

          document.addEventListener("visibilitychange", () => {
            if (document.hidden) AudioController.pause();
          });
        }
      };

      document.addEventListener("DOMContentLoaded", () => App.init());
      window.App = App;
      window.DarAlKalimahLecon4 = App;
    })();
  </script>
</body>
</html>
