<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dar Al-Kalimah - Leçon 4 (Module 4) | التنوين - الهمزة</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --burgundy: #5D1828;
      --burgundy-dark: #3a0f19;
      --gold: #C8A462;
      --gold-light: #dfc28b;
      --white: #FFFFFF;
      --bg-beige: #FAF6F0;
      --text-dark: #2C3E50;
      --text-soft: #8c775a;
      
      --shadow-soft: 0 8px 25px rgba(93, 24, 40, 0.04);
      --shadow-card: 0 20px 50px rgba(93, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-beige);
      background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg-beige) 80%);
      font-family: 'Montserrat', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      padding: 20px 15px 50px;
      overflow-x: hidden;
    }

    .ar-text {
      font-family: "Amiri", serif;
      direction: rtl;
      unicode-bidi: isolate;
      line-height: 1.6;
      text-rendering: optimizeLegibility;
      font-feature-settings: "mark" 1, "mkmk" 1;
      text-align: right;
    }

    .gold-mark { color: var(--gold) !important; font-weight: bold; font-family: "Amiri", serif; }

    .serif-text {
      font-family: "Cinzel", Georgia, serif;
      text-align: center;
    }

    .page-shell {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 0 10px;
    }

    .progress-counter {
      background: var(--white);
      color: var(--burgundy);
      padding: 10px 25px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(200, 164, 98, 0.3);
      letter-spacing: 1.5px;
    }

    .btn-home {
      color: var(--gold);
      font-size: 2rem;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
      background: transparent;
      border: none;
    }

    .btn-home:hover {
      transform: scale(1.1);
      color: var(--burgundy);
    }

    .card-container {
      width: 100%;
      perspective: 2000px;
      margin-bottom: 40px;
    }

    .card-flip {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    .card-flip.is-flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      width: 100%;
      backface-visibility: hidden;
      background: #FFFFFF;
      border-radius: 24px;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(200, 164, 98, 0.5);
      display: flex;
      flex-direction: column;
      padding: 40px 20px 60px; 
    }

    .card-front { position: relative; z-index: 2; }
    .card-back { position: absolute; top: 0; left: 0; right: 0; bottom: 0; height: 100%; transform: rotateY(180deg); }

    .card-branding {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
    }

    .brand-ar-top {
      color: var(--gold);
      font-size: 2.2rem;
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
    }

    .brand-fr {
      color: var(--burgundy);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .cb-line {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 25px auto;
      opacity: 0.4;
    }

    .content-wrap {
      flex: 1;
      padding: 0 30px;
      display: flex;
      flex-direction: column;
      align-items: center; 
    }

    .module-title-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 10px;
      text-align: center;
      gap: 40px;
    }

    .ar-module-title {
      font-family: 'Amiri', serif;
      font-size: 3.5rem;
      font-weight: 700;
      color: #5D1828;
      margin: 0;
      padding: 0;
      line-height: 1.2;
    }

    .fr-module-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      color: #8c775a;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: 500;
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    .elegant-separator {
      width: 120px;
      height: 1px;
      background-color: var(--gold);
      border: none;
      margin: 15px auto 40px auto; 
      opacity: 0.6;
    }

    .rules-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 25px; 
    }

    .main-rule-ar {
      font-family: "Amiri", serif;
      font-size: 2.5rem;
      color: var(--burgundy);
      line-height: 1.8;
      text-align: center;
      direction: rtl;
      font-weight: 600;
      width: 100%;
    }

    .main-rule-fr, .main-rule-es {
      font-size: 1.05rem;
      line-height: 1.7;
      font-weight: 500;
    }
    
    .main-rule-es {
      font-style: italic;
    }

    .examples-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center; 
      padding: 10px 40px;
    }

    .example-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px; 
      text-align: center;
      padding: 25px 0;
      border-bottom: 1px solid rgba(200, 164, 98, 0.4);
      width: 85%;
      margin: 0 auto;
    }
    
    .example-block:last-child {
      border-bottom: none; 
      padding-bottom: 0;
    }
    
    .example-block:first-child {
      padding-top: 0;
    }

    .example-word-ar {
      font-family: "Amiri", serif;
      font-size: 4rem; 
      color: var(--burgundy); 
      text-align: center;
      direction: rtl;
      font-weight: 700;
      line-height: 1.3; 
    }

    /* LE MICRO VINTAGE OFFICIEL (bouton rond avec l'émoji) */
    .btn-audio-small {
      background: var(--bg-beige);
      border: 1px solid var(--gold);
      color: var(--burgundy);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(200, 164, 98, 0.2);
      transition: all 0.3s ease;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-audio-small:hover {
      transform: scale(1.1);
      background: var(--gold);
      color: var(--white);
    }

    .latin-example-trans {
      font-size: 1.1rem;
      color: var(--burgundy); 
      font-weight: 500;
      direction: ltr; 
    }
    .latin-example-trans span { display: block; line-height: 1.5; }
    .latin-example-trans .trans-es { color: var(--text-soft); font-style: italic; }

    .nav-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 900px;
      gap: 20px;
    }

    .btn-nav {
      background: var(--white);
      border: 1px solid rgba(200, 164, 98, 0.5);
      color: var(--burgundy);
      padding: 20px 40px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: var(--shadow-soft);
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    .btn-nav:hover {
      background: var(--burgundy);
      color: var(--white);
      border-color: var(--burgundy);
      transform: translateY(-3px);
    }

    .btn-nav:disabled {
      opacity: 0.4;
      pointer-events: none;
      background: transparent;
      border-color: #ccc;
      color: #999;
      box-shadow: none;
    }

    @media (max-width: 768px) {
      .ar-module-title { font-size: 3rem; }
      .main-rule-ar { font-size: 2.2rem; }
      .example-word-ar { font-size: 3.5rem; }
      .content-wrap { padding: 0 15px; }
      .examples-wrapper { padding: 10px 15px; }
      .card-face { padding: 30px 15px 50px; }
    }

    @media (max-width: 480px) {
      .brand-ar-top { font-size: 2rem; }
      .brand-fr { font-size: 0.85rem; }
      .ar-module-title { font-size: 2.5rem; }
      .fr-module-title { font-size: 0.95rem; }
      .main-rule-ar { font-size: 1.8rem; line-height: 1.6; }
      .example-word-ar { font-size: 3rem; }
      .btn-nav { font-size: 0.95rem; padding: 15px 20px; }
      .rules-stack { gap: 20px; }
      .module-title-group { gap: 25px; }
      .btn-audio-small { width: 38px; height: 38px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <div class="page-shell">
    
    <div class="app-header">
      <div class="progress-counter"><span id="current-index">1</span> / <span id="total-cards">8</span></div>
      <a href="module4.html" class="btn-home" title="Retour au menu"><i class="fa-solid fa-house"></i></a>
    </div>

    <div class="card-container">
      <div class="card-flip" id="flashcard" onclick="toggleFlip(event)">
        <div class="card-face card-front" id="front-face"></div>
        <div class="card-face card-back" id="back-face"></div>
      </div>
    </div>

    <div class="nav-controls">
      <button class="btn-nav" id="btn-prev" onclick="prevCard(event)">
        <i class="fa-solid fa-arrow-left"></i> Précédent
      </button>
      <button class="btn-nav" id="btn-next" onclick="nextCard(event)">
        Suivant <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>

  </div>

  <script>
    const lessonData = [
      {
        titleAr: "التَّنْوِين",
        titleFr: "AT-TANWĪN",
        ruleAr: "التَّنْوِينُ هُوَ تَضْعِيفُ الْحَرَكَةِ الْقَصِيرَةِ فِي آخِرِ الِاسْمِ، وَيُضِيفُ صَوْتَ نُونٍ سَاكِنَةٍ تُلْفَظُ وَلَا تُكْتَبُ.",
        nounRuleAr: `
          <div style='display: grid; grid-template-columns: auto auto auto; gap: 40px; justify-content: center; align-items: baseline; text-align: center; margin: 10px auto 35px auto; direction: rtl;'>
            <span class='gold-mark' style='font-family: sans-serif; font-size:5.5rem; line-height:1; grid-row: 1; grid-column: 1;'>◌ًا</span>
            <span class='gold-mark' style='font-family: sans-serif; font-size:5.5rem; line-height:1; grid-row: 1; grid-column: 2;'>◌ٌ</span>
            <span class='gold-mark' style='font-family: sans-serif; font-size:5.5rem; line-height:1; grid-row: 1; grid-column: 3;'>◌ٍ</span>
            
            <div style="grid-row: 2; grid-column: 1; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();" title="Écouter">🎙️</button></div>
            <div style="grid-row: 2; grid-column: 2; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();" title="Écouter">🎙️</button></div>
            <div style="grid-row: 2; grid-column: 3; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();" title="Écouter">🎙️</button></div>
          </div>
          <div style='font-size:1.6rem; color: var(--burgundy); line-height:1.7;'>
            يُضَافُ (ا) مَعَ تَنْوِينِ الفَتْحِ دَائِمًا، <strong style='color:var(--gold);'>مَا عَدَا :</strong> الكَلِمَاتِ الْمُنْتَهِيَةِ بِـ (ة) أَوْ (اء)
          </div>`,
        ruleFr: `Le tanwīn est le doublement de la voyelle courte à la fin du nom. Il ajoute un son "N" (nūn sākinah) qui se prononce mais ne s'écrit pas.<br><br>On ajoute toujours un Alif avec le tanwīn fathah, <strong style='color:var(--gold); text-transform:uppercase;'>sauf</strong> pour les mots qui se terminent par ة ou اء.`,
        ruleEs: `El tanwīn es la duplicación de la vocal corta al final del sustantivo. Añade un sonido "N" (nūn sākinah) que se pronuncia pero no se escribe.<br><br>Siempre se añade un Alif con el tanwīn fathah, <strong style='color:var(--gold); text-transform:uppercase;'>excepto</strong> en palabras que terminan en ة o اء.`,
        examples: [
          { word: "كِتَاب<span class='gold-mark'>اً</span>", transFr: "Un livre (Kitāban)", transEs: "Un libro (Kitāban)" },
          { word: "بَيْت<span class='gold-mark'>&#x200B;ٌ</span>", transFr: "Une maison (Baytun)", transEs: "Una casa (Baytun)" },
          { word: "قَلَم<span class='gold-mark'>&#x200B;ٍ</span>", transFr: "Un stylo (Qalamin)", transEs: "Un bolígrafo (Qalamin)" },
          { word: "مَدْرَسَة<span class='gold-mark'>&#x200B;ً</span>", transFr: "Exception ة (Madrasatan)", transEs: "Excepción ة (Madrasatan)" }
        ]
      },
      {
        titleAr: "هَمْزَةُ الْقَطْع",
        titleFr: "HAMZAT AL-QAT'",
        ruleAr: "الْهَمْزَةُ حَرْفٌ يُنْطَقُ دَائِمًا، فِي أَوَّلِ الكَلَامِ أَوْ وَسَطِهِ",
        nounRuleAr: `
          <div style='display: grid; grid-template-columns: auto auto auto auto auto auto auto auto auto; gap: 20px; justify-content: center; align-items: baseline; margin-top: 20px; direction: rtl;'>
            <span class='gold-mark' style='font-size:3.5rem; line-height:1; grid-row: 1; grid-column: 1;'>أَ</span>
            <div style='width:2px; height:45px; background-color:var(--burgundy); border-radius:2px; opacity:0.4; grid-row: 1; grid-column: 2; align-self: center;'></div>
            <span class='gold-mark' style='font-size:3.5rem; line-height:1; grid-row: 1; grid-column: 3;'>إِ</span>
            <div style='width:2px; height:45px; background-color:var(--burgundy); border-radius:2px; opacity:0.4; grid-row: 1; grid-column: 4; align-self: center;'></div>
            <span class='gold-mark' style='font-size:3.5rem; line-height:1; grid-row: 1; grid-column: 5;'>ؤُ</span>
            <div style='width:2px; height:45px; background-color:var(--burgundy); border-radius:2px; opacity:0.4; grid-row: 1; grid-column: 6; align-self: center;'></div>
            <span class='gold-mark' style='font-size:3.5rem; line-height:1; grid-row: 1; grid-column: 7;'>ئِ</span>
            <div style='width:2px; height:45px; background-color:var(--burgundy); border-radius:2px; opacity:0.4; grid-row: 1; grid-column: 8; align-self: center;'></div>
            <span class='gold-mark' style='font-size:3.5rem; line-height:1; grid-row: 1; grid-column: 9;'>ءَ</span>
            
            <div style="grid-row: 2; grid-column: 1; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button></div>
            <div style="grid-row: 2; grid-column: 3; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button></div>
            <div style="grid-row: 2; grid-column: 5; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button></div>
            <div style="grid-row: 2; grid-column: 7; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button></div>
            <div style="grid-row: 2; grid-column: 9; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button></div>
          </div>`,
        ruleFr: "La Hamza (de coupure) se prononce toujours. Elle s'écrit sur différents supports selon sa voyelle.",
        ruleEs: "La Hamza (de corte) siempre se pronuncia. Se escribe sobre diferentes soportes según su vocal.",
        examples: [
          { word: "<span class='gold-mark'>أَ</span>سَد", transFr: "Lion (Asad)", transEs: "León (Asad)" },
          { word: "سُ<span class='gold-mark'>ؤَ</span>ال", transFr: "Question (Su'āl)", transEs: "Pregunta (Su'āl)" },
          { word: "شَيْ<span class='gold-mark'>ء</span>", transFr: "Chose (Shay')", transEs: "Cosa (Shay')" }
        ]
      },
      {
        titleAr: "قُوَّةُ الْحَرَكَات",
        titleFr: "LA FORCE DES VOYELLES",
        titleEs: "LA FUERZA DE LAS VOCALES",
        ruleAr: "لِكِتَابَةِ الهَمْزَةِ المُتَوَسِّطَةِ، نَعْتَمِدُ عَلَى قُوَّةِ الحَرَكَاتِ",
        nounRuleAr: `
          <div style='display: grid; grid-template-columns: auto auto auto auto auto auto auto; gap: 25px; justify-content: center; align-items: baseline; direction: ltr; font-weight: bold; font-family: sans-serif; margin-top: 15px;'>
            <span style='font-size:4.5rem; color:var(--gold); line-height:1; grid-row: 1; grid-column: 1;'>◌ِ</span>
            <span style='font-size:2.5rem; color:var(--text-soft); font-family: "Montserrat", sans-serif; grid-row: 1; grid-column: 2;'>&gt;</span>
            <span style='font-size:4.5rem; color:var(--gold); line-height:1; grid-row: 1; grid-column: 3;'>◌ُ</span>
            <span style='font-size:2.5rem; color:var(--text-soft); font-family: "Montserrat", sans-serif; grid-row: 1; grid-column: 4;'>&gt;</span>
            <span style='font-size:4.5rem; color:var(--gold); line-height:1; grid-row: 1; grid-column: 5;'>◌َ</span>
            <span style='font-size:2.5rem; color:var(--text-soft); font-family: "Montserrat", sans-serif; grid-row: 1; grid-column: 6;'>&gt;</span>
            <span style='font-size:4.5rem; color:var(--gold); line-height:1; grid-row: 1; grid-column: 7;'>◌ْ</span>

            <div style="grid-row: 2; grid-column: 1; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button></div>
            <div style="grid-row: 2; grid-column: 3; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button></div>
            <div style="grid-row: 2; grid-column: 5; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button></div>
            <div style="grid-row: 2; grid-column: 7; display:flex; justify-content:center; margin-top:10px;"><button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button></div>
          </div>
          <div style='font-size:1.6rem; margin-top:30px; color:var(--burgundy); display: flex; flex-direction: column; gap: 15px; align-items: center;'>
            <div style='display: flex; align-items: center; gap: 15px; direction: rtl;'>
              <span>الكَسْرَةُ تُعْطِي (<span class='gold-mark'>ئِـ</span>)</span>
              <button class="btn-audio-small" style="width: 38px; height: 38px; font-size: 1.1rem;" onclick="event.stopPropagation();">🎙️</button>
            </div>
            <div style='display: flex; align-items: center; gap: 15px; direction: rtl;'>
              <span>الضَّمَّةُ تُعْطِي (<span class='gold-mark'>ؤُ</span>)</span>
              <button class="btn-audio-small" style="width: 38px; height: 38px; font-size: 1.1rem;" onclick="event.stopPropagation();">🎙️</button>
            </div>
            <div style='display: flex; align-items: center; gap: 15px; direction: rtl;'>
              <span>الفَتْحَةُ تُعْطِي (<span class='gold-mark'>أَ</span>)</span>
              <button class="btn-audio-small" style="width: 38px; height: 38px; font-size: 1.1rem;" onclick="event.stopPropagation();">🎙️</button>
            </div>
          </div>`,
        ruleFr: "Pour placer la Hamza, on respecte une hiérarchie stricte : Kasra > Damma > Fatha > Soukoun.<br><br><span style='color:var(--text-soft);'>La voyelle gagnante impose sa « chaise » (son support).</span>",
        ruleEs: "Para colocar la Hamza, respetamos la jerarquía: Kasra > Damma > Fatha > Sukoun.<br><br><span style='color:var(--text-soft);'>La vocal ganadora impone su «silla».</span>",
        examples: [

      {

        ruleAr: "فِي آخِرِ الكَلِمَةِ، نَنْظُرُ <strong style='color:var(--gold);'>فَقَطْ</strong> إِلَى حَرَكَةِ الحَرْفِ الَّذِي قَبْلَ الهَمْزَةِ",
        nounRuleAr: "<div style='font-size:1.8rem; color: var(--burgundy); line-height:1.7;'>حَرَكَةُ الهَمْزَةِ نَفْسِهَا لَا تُهِمُّ هُنَا!</div>",

        nounRuleAr: `
          <div style='display:flex; flex-direction:column; align-items:center; gap:20px; margin-top:15px;'>

        examples: [
          { word: "<span class='gold-mark'>ٱ</span>سْم", transFr: "En début de phrase : (Ism)", transEs: "Al inicio : (Ism)" },
          { word: "وَ<span class='gold-mark'>ٱ</span>سْم", transFr: "Lié à la particule 'Wa' : Muette (Wasm)", transEs: "Enlazado con 'Wa' : Muda (Wasm)" }
        ]
      },
      {
        titleAr: "نُطْقُ هَمْزَةِ الْوَصْل",
        titleFr: "PRONONCIATION DE HAMZAT AL-WASL",
        titleEs: "PRONUNCIACIÓN DE HAMZAT AL-WASL",
        ruleAr: "إِذَا بَدَأْنَا بِهَا الكَلَام، كَيْفَ نَقْرَؤُهَا؟",
        customAlign: "center",
        nounRuleAr: `
          <div style='font-size:1.4rem; color: var(--burgundy); line-height:1.6; display:flex; flex-direction:column; align-items:center; gap:12px; direction: rtl;'>
            <div style='display:flex; align-items:center; gap:12px; justify-content: center;'>
              <span><span style='color:var(--gold);'>•</span> مَعَ (ال) ← <span class='gold-mark'>فَتْحَة (◌َ)</span></span>
              <button class="btn-audio-small" style="width: 36px; height: 36px; font-size: 1.1rem;" onclick="event.stopPropagation();">🎙️</button>
            </div>
            <div style='display:flex; align-items:center; gap:12px; justify-content: center;'>
              <span><span style='color:var(--gold);'>•</span> فِي ٱسْم، ٱبْن ← <span class='gold-mark'>كَسْرَة (◌ِ)</span></span>
              <button class="btn-audio-small" style="width: 36px; height: 36px; font-size: 1.1rem;" onclick="event.stopPropagation();">🎙️</button>
            </div>
            <div style='text-align:center;'>
              <span><span style='color:var(--gold);'>•</span> فِي الأَفْعَال ← <span class='gold-mark'>نَنْظُرُ لِلْحَرْفِ الثَّالِثِ :</span></span>
            </div>
            <div style='display:flex; align-items:center; gap:12px; justify-content: center;'>
              <span>فَتْحَة (◌َ) أَوْ كَسْرَة (◌ِ) = نَنْطِقُ <strong style='font-size:1.6rem;'>(إِ)</strong></span>
              <button class="btn-audio-small" style="width: 36px; height: 36px; font-size: 1.1rem;" onclick="event.stopPropagation();">🎙️</button>
            </div>
            <div style='display:flex; align-items:center; gap:12px; justify-content: center;'>
              <span>ضَمَّة (◌ُ) = نَنْطِقُ <strong style='font-size:1.6rem;'>(أُ)</strong></span>
              <button class="btn-audio-small" style="width: 36px; height: 36px; font-size: 1.1rem;" onclick="event.stopPropagation();">🎙️</button>
            </div>
          </div>`,
        ruleFr: "Au début du mot :<br>1. Avec (ال) on dit <strong>A</strong>. Avec (Ism/Ibn) on dit <strong>I</strong>.<br>2. <strong style='color:var(--burgundy);'>LES VERBES :</strong> on regarde la 3ème lettre<br>👉 Si Fatha ou Kasra = on prononce <strong>I</strong>.<br>👉 Si Damma = on prononce <strong>OU (U)</strong>.",
        ruleEs: "Al inicio de la palabra:<br>1. Con (ال) se dice <strong>A</strong>. Con (Ism/Ibn) se dice <strong>I</strong>.<br>2. <strong style='color:var(--burgundy);'>VERBOS :</strong> miramos la 3ra letra<br>👉 Si Fatha o Kasra = se pronuncia <strong>I</strong>.<br>👉 Si Damma = se pronuncia <strong>U</strong>.",
        examples: [
          { word: "ٱكْـ<span class='gold-mark'>تُـ</span>بْ", transFr: "3ème lettre Damma (ُ) → OU (Uktub)", transEs: "3ra letra Damma (ُ) → U (Uktub)" },
          { word: "ٱفْـ<span class='gold-mark'>تَـ</span>حْ", transFr: "3ème lettre Fatha (َ) → I (Iftah)", transEs: "3ra letra Fatha (َ) → I (Iftah)" },
          { word: "ٱجْـ<span class='gold-mark'>لِـ</span>سْ", transFr: "3ème lettre Kasra (ِ) → I (Ijlis)", transEs: "3ra letra Kasra (ِ) → I (Ijlis)" }

        nounRuleAr: `
          <div style='display:flex; flex-direction:column; align-items:center; gap:20px; margin-top:20px;'>
            <span class='gold-mark' style='font-size:4rem; line-height:1;'>ٱ</span>
            <button class="btn-audio-small" onclick="event.stopPropagation();">🎙️</button>
          </div>`,
        ruleFr: "Exemples de Hamzat Al-Wasl. Comment les prononcer en début de lecture.",
        ruleEs: "Ejemplos de Hamzat Al-Wasl. Cómo pronunciarlos al inicio de la lectura.",
        examples: [
          { word: "<span class='gold-mark'>ٱ</span>قْرَأْ", transFr: "Lis (Iqra')", transEs: "Lee (Iqra')" },
          { word: "بِ<span class='gold-mark'>ٱ</span>سْمِ", transFr: "Au nom de (Bismi)", transEs: "En el nombre de (Bismi)" }
        ]
      }
    ];

    let currentIndex = 0;
    let isFlipped = false;

    const flashcard = document.getElementById("flashcard");
    const frontFace = document.getElementById("front-face");
    const backFace = document.getElementById("back-face");

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("total-cards").innerText = lessonData.length;
      renderCard(currentIndex);
    });

    function renderCard(index) {
      const data = lessonData[index];
      document.getElementById("current-index").innerText = index + 1;

      if (isFlipped) {
        flashcard.classList.remove("is-flipped");
        isFlipped = false;
        setTimeout(() => {
          updateFront(data);
          updateBack(data);
        }, 350);
      } else {
        updateFront(data);
        updateBack(data);
      }

      document.getElementById("btn-prev").disabled = (index === 0);
      document.getElementById("btn-next").disabled = (index === lessonData.length - 1);
    }

    function updateFront(data) {
      const titleEsHtml = data.titleEs ? ` <span style="color:var(--gold); margin:0 10px;">•</span> ${data.titleEs}` : '';
      
      const alignCustom = data.customAlign || "left";
      
      frontFace.innerHTML = `
        <div class="card-branding">
          <div class="brand-ar-top ar-text">دار الكلمة</div>
          <div class="brand-fr serif-text">Dar Al-Kalimah</div>
          <div class="cb-line"></div>
        </div>
        
        <div class="content-wrap">
          <div class="module-title-group">
            <h1 class="ar-module-title">${data.titleAr}</h1>
            <h2 class="fr-module-title">${data.titleFr}${titleEsHtml}</h2>
          </div>
          
          <hr class="elegant-separator">
          
          <div class="rules-stack">
            <div class="main-rule-ar ar-text" style="text-align: ${data.customAlign === 'center' ? 'center' : 'center'};">${data.ruleAr}</div>
            <div class="main-rule-ar ar-text" style="font-size: 1.8rem;">${data.nounRuleAr}</div>
            
            <hr class="elegant-separator" style="margin: 10px auto 20px auto;">
            
            <div style="width: 100%; padding: 0 10px;">
              <div class="main-rule-fr" style="color:var(--text-dark); text-align: ${alignCustom};">${data.ruleFr}</div>
              <div style="width: 60px; height: 1px; background-color: var(--gold); margin: 20px auto; opacity: 0.4;"></div>
              <div class="main-rule-es" style="color:var(--text-soft); text-align: ${alignCustom};">${data.ruleEs}</div>
            </div>
          </div>
        </div>
      `;
    }

    function updateBack(data) {
      const examplesHtml = data.examples.map(ex => `
        <div class="example-block">
          <div class="example-word-ar ar-text">${ex.word}</div>
          <div class="latin-example-trans">
            <span class="trans-fr">${ex.transFr}</span>
            <span class="trans-es">${ex.transEs}</span>
          </div>
        </div>
      `).join('');

      backFace.innerHTML = `
        <div class="card-branding">
          <div class="brand-ar-top ar-text">دار الكلمة</div>
          <div class="brand-fr serif-text">Dar Al-Kalimah</div>
          <div class="cb-line"></div>
        </div>
        
        <div class="examples-wrapper">
          ${examplesHtml}
        </div>
      `;
    }

    function toggleFlip(event) {
      isFlipped = !isFlipped;
      flashcard.classList.toggle("is-flipped");
    }

    function nextCard(e) {
      e.stopPropagation();
      if (currentIndex < lessonData.length - 1) {
        currentIndex++;
        renderCard(currentIndex);
      }
    }

    function prevCard(e) {
      e.stopPropagation();
      if (currentIndex > 0) {
        currentIndex--;
        renderCard(currentIndex);
      }
    }
  </script>
</body>
</html>
