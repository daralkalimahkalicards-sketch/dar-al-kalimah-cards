<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalicards - Module 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --burgundy: #5D1828; --gold: #C8A462; --gold-light: #dfc28b; --white: #FFFFFF; --bg-beige: #FAF6F0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg-beige); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Montserrat', sans-serif; padding: 20px; }
        
        .menu-container { 
            background: var(--burgundy); 
            padding: 60px 40px; border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(93, 24, 40, 0.25); 
            text-align: center; width: 100%; 
            max-width: 550px; /* Dimension identique au Module 1 */
            position: relative; animation: fadeIn 0.5s ease-out; 
        }

        /* MAISON À DROITE */
        .home-icon { position: absolute; top: 25px; right: 25px; color: var(--gold-light); font-size: 1.6rem; transition: all 0.3s ease; text-decoration: none; }
        .home-icon:hover { color: var(--gold); transform: scale(1.1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .brand-ar { font-family: "Amiri", serif; font-size: 3.8rem; font-weight: bold; color: var(--gold); margin-bottom: 5px; line-height: 1.1; }
        .app-title { font-family: "Cinzel", serif; font-size: 1.2rem; color: #d09470; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; margin-bottom: 20px; }
        .divider { width: 60px; height: 2px; background-color: var(--gold); margin: 0 auto 30px auto; opacity: 0.5; }
        .instruction-fr { font-size: 1.05rem; font-weight: 500; color: var(--white); margin-bottom: 5px; }
        .instruction-es { font-size: 0.9rem; color: var(--gold-light); font-style: italic; margin-bottom: 35px; }
        
        .btn-nav { display: block; width: 100%; max-width: 350px; margin: 0 auto 15px auto; padding: 18px; background: transparent; border: 2px solid var(--gold); color: var(--gold); border-radius: 50px; text-decoration: none; font-size: 1rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.3s ease; }
        .btn-nav:hover { background-color: rgba(200, 164, 98, 0.1); transform: translateY(-3px); border-color: var(--gold-light); color: var(--gold-light); }

        @media (max-width: 480px) { .menu-container { padding: 50px 25px; } .brand-ar { font-size: 3rem; } .app-title { font-size: 1rem; } .home-icon { top: 20px; right: 20px; } }
    </style>
</head>
<body>
    <div class="menu-container">
        <a href="modules.html" class="home-icon"><i class="fa-solid fa-house"></i></a>
        <div class="brand-ar">دار الكلمة</div>
        <div class="app-title">KALICARDS – MODULE 2</div>
        <div class="divider"></div>
        <div class="instruction-fr">Sélectionnez une activité</div>
        <div class="instruction-es">Selecciona una actividad</div>
        
        <a href="lecon2.html" class="btn-nav">LA LEÇON / LA LECCIÓN</a>
        
        <a href="quiz2-1.html" class="btn-nav">QUIZ 1</a>
        <a href="quiz2-2.html" class="btn-nav">QUIZ 2</a>
        <a href="quiz2-3.html" class="btn-nav">QUIZ 3</a>
    </div>
</body>
</html>
