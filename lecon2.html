<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dar Al-Kalimah - Leçon 2 (Al-Harakat) - Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           VARIABLES LUXE "DAR AL-KALIMAH"
           ========================================= */
        :root {
            --burgundy: #5D1828;
            --burgundy-dark: #3a0f19;
            --gold: #C8A462;
            --gold-light: #dfc28b;
            --white: #FFFFFF;
            --bg-beige: #FAF6F0;
            --text-dark: #2C3E50;
            
            /* 4 COULEURS PÉDAGOGIQUES */
            --color-fathah: #E53935;  /* Rouge */
            --color-dammah: #1E88E5;  /* Bleu */
            --color-kasrah: #43A047;  /* Vert */
            --color-soukoun: #8E44AD; /* Violet */
            
            --shadow-soft: 0 8px 25px rgba(93, 24, 40, 0.06);
            --shadow-card: 0 15px 40px rgba(93, 24, 40, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-beige);
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg-beige) 80%);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 20px 15px; overflow-x: hidden;
        }

        /* TYPO ARABE PARFAITE ET CORRECTION HARAKATES */
        .ar-text { 
            font-family: "Amiri", serif; 
            letter-spacing: 0px;
            direction: rtl; 
        }
        .serif-text { font-family: "Cinzel", "Georgia", serif; text-align: center; }

        /* HEADER */
        .app-header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px; }
        .progress-counter { background: var(--burgundy); color: var(--white); padding: 8px 20px; border-radius: 30px; font-weight: 600; font-size: 1.05rem; box-shadow: var(--shadow-soft); border: 1px solid var(--gold); }
        .btn-home { color: var(--gold); font-size: 1.8rem; text-decoration: none; transition: 0.3s; }
        .btn-home:hover { transform: scale(1.1); color: var(--gold-light); }

        /* CARTE 3D */
        .card-container { width: 100%; max-width: 950px; margin-bottom: 30px; perspective: 2000px; }
        .card-flip { position: relative; width: 100%; min-height: 720px; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .card-flip.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backface-visibility: hidden; background: var(--white); border-radius: 24px; box-shadow: var(--shadow-card); border: 1px solid rgba(200, 164, 98, 0.4); display: flex; flex-direction: column; overflow: hidden; }

        /* BRANDING */
        .card-branding { text-align: center; padding: 25px 20px 5px 20px; flex: 0 0 auto; z-index: 5;}
        .brand-ar-top { color: var(--gold); font-size: 2.2rem; font-weight: bold; }
        .brand-fr { color: var(--burgundy); font-size: 1rem; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; }
        .cb-line { width: 40px; height: 1px; background: var(--gold); margin: 12px auto 0; opacity: 0.5; }
        .flip-hint { position: absolute; top: 20px; right: 20px; font-size: 1.2rem; color: var(--gold-light); opacity: 0.6; animation: pulseHint 2s infinite; z-index: 10; }
        @keyframes pulseHint { 0%, 100% { transform: scale(1); opacity: 0.5;} 50% { transform: scale(1.1); opacity: 1;} }

        /* =========================================
           FACE RECTO
           ========================================= */
        .card-front { z-index: 2; transform: rotateY(0deg); background: var(--white); }
        .front-center-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; padding: 10px 20px; }
        
        /* CORRECTION CHIRURGICALE HARAKATES TRÈS PROCHES ET ÉLOIGNEMENT MICRO */
        .main-letter { 
            font-size: 7.5rem; color: var(--burgundy); font-weight: bold; 
            text-shadow: 0 5px 15px rgba(93, 24, 40, 0.08); 
            margin-bottom: 85px; /* ÉLOIGNE LE MICRO (ج ح خ ع غ s'emelle plus) */
            line-height: 0.7; /* RAPPROCHE LES HARAKATES ENCORE PLUS */
            font-feature-settings: "mark" 1; /* Force le positionnement précis */
        }
        
        .main-audio-row { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 15px; }
        
        .harakat-container { display: flex; flex-direction: row; justify-content: center; align-items: stretch; width: 100%; border-top: 1px solid rgba(200, 164, 98, 0.2); padding: 20px 20px 35px 20px; direction: rtl; gap: 15px; flex-shrink: 0;}
        
        /* CASES PLUS GRANDES ET AÉRÉES */
        .harakat-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 25px 10px; border-radius: 16px; border: 1px solid rgba(200, 164, 98, 0.2); transition: all 0.3s; background: var(--white); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        
        /* HOVER RECTO */
        .harakat-col.active[data-type="fathah"] { border-color: var(--color-fathah); background-color: rgba(229,57,53,0.03); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(229,57,53,0.08);}
        .harakat-col.active[data-type="dammah"] { border-color: var(--color-dammah); background-color: rgba(30,136,229,0.03); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(30,136,229,0.08);}
        .harakat-col.active[data-type="kasrah"] { border-color: var(--color-kasrah); background-color: rgba(67,160,71,0.03); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(67,160,71,0.08);}
        .harakat-col.active[data-type="soukoun"]{ border-color: var(--color-soukoun); background-color: rgba(142,68,173,0.03); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(142,68,173,0.08);}

        .col-title-ar { font-size: 1.2rem; color: var(--burgundy); font-weight: bold; margin-bottom: 5px; text-align: center; }
        .col-title-trans { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
        .col-t-fr { font-size: 0.8rem; font-weight: 600; color: #a99478; text-transform: uppercase; letter-spacing: 0.5px;}
        .col-t-es { font-size: 0.75rem; color: #a99478; font-style: italic; }
        
        .col-form { font-size: 3.5rem; color: var(--gold); font-weight: bold; margin-bottom: 15px; line-height: 1; }

        /* =========================================
           FACE VERSO
           ========================================= */
        .card-back { transform: rotateY(180deg); }

        .card-back .harakat-container {
            flex-grow: 1; align-items: center; border-top: none; padding-top: 0;
        }

        .verso-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; background: var(--white); border-radius: 16px; padding: 25px 10px; border: 1px solid rgba(200, 164, 98, 0.3); transition: all 0.3s ease; cursor: pointer; height: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        
        /* Couleurs du verso */
        .verso-col.col-fathah { border-top: 5px solid var(--color-fathah); }
        .verso-col.col-dammah { border-top: 5px solid var(--color-dammah); }
        .verso-col.col-kasrah { border-top: 5px solid var(--color-kasrah); }
        .verso-col.col-soukoun{ border-top: 5px solid var(--color-soukoun); }

        /* Activation couleur Verso */
        .verso-col.active[data-type="fathah"] { background-color: rgba(229,57,53,0.03); border-color: var(--color-fathah); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(229,57,53,0.08);}
        .verso-col.active[data-type="dammah"] { background-color: rgba(30,136,229,0.03); border-color: var(--color-dammah); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(30,136,229,0.08);}
        .verso-col.active[data-type="kasrah"] { background-color: rgba(67,160,71,0.03); border-color: var(--color-kasrah); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(67,160,71,0.08);}
        .verso-col.active[data-type="soukoun"]{ background-color: rgba(142,68,173,0.03); border-color: var(--color-soukoun); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(142,68,173,0.08);}

        .verso-form { 
            margin-top: 25px; margin-bottom: 20px; font-size: 3.5rem; font-weight: bold; color: var(--gold); 
            line-height: 0.7; 
            font-feature-settings: "mark" 1;
        }
        
        .verso-separator { width: 40px; height: 1px; background-color: var(--gold-light); opacity: 0.5; margin: 0 auto 20px auto; flex-shrink: 0; }
        
        .ex-word { font-size: 2.8rem; color: var(--burgundy); font-weight: bold; margin-bottom: 10px; text-align: center; line-height: normal;}

        /* TEXTES ET BOUTONS */
        .gold-text { color: var(--gold) !important; font-weight: 700; }
        .burgundy-text { color: var(--burgundy) !important; }
        .col-ph-fr, .col-ph-es { font-size: 0.8rem; white-space: nowrap; }
        
        .btn-audio-main { background: var(--white); border: 1px solid var(--gold); color: var(--burgundy); width: 38px; height: 38px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .btn-audio-micro { background: var(--white); border: 1px solid var(--gold-light); color: var(--burgundy); width: 32px; height: 32px; border-radius: 50%; font-size: 0.9rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; margin: 0 8px;}
        
        .col-footer-row { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 4px; width: 100%; margin-top: auto; padding-top: 10px;}
        
        .nav-controls { display: flex; justify-content: space-between; width: 100%; max-width: 950px; gap: 20px; }
        .btn-nav { flex: 1; background: var(--white); border: 2px solid var(--gold); color: var(--burgundy); padding: 15px; border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s; text-transform: uppercase; text-align: center;}
        .btn-nav:hover { background: var(--gold); color: var(--white); transform: translateY(-3px); }
        .btn-nav:disabled { opacity: 0.3; pointer-events: none; }

        /* =========================================
           RESPONSIVE MOBILE (GRILLE 2x2 POUR 4 COLONNES)
           ========================================= */
        @media (max-width: 768px) {
            .card-flip { min-height: auto; }
            .card-face { position: relative; height: auto; display: none; }
            .card-flip:not(.is-flipped) .card-front { display: flex; }
            .card-flip.is-flipped .card-back { display: flex; transform: rotateY(0); }
            
            .main-letter { font-size: 5rem !important; margin-bottom: 60px !important; }
            
            .harakat-container { display: grid !important; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px 10px 25px 10px; flex-shrink: 0; }
            .card-back .harakat-container { align-items: stretch; }
            .harakat-col, .verso-col { margin: 0; padding: 20px 5px; }
            
            .col-form, .verso-form { font-size: 2.8rem !important; margin-bottom: 10px; }
            .ex-word { font-size: 2.2rem !important; }
            .col-title-ar { font-size: 1.1rem; }
            .col-title-trans { margin-bottom: 15px; }
            .col-footer-row { flex-direction: column; gap: 6px; }
        }
    </style>
</head>

        let currentIndex = 0; let isFlipped = false; let currentAudio = new Audio();

        // FONCTION MAGIQUE POUR COLORER UNIQUEMENT LA LETTRE CIBLÉE
        function highlightHarakah(word, form) {
            if (!word || !form) return word;
            return word.replace(form, '<span class="gold-text">' + form + '</span>');
        }

        function renderCard(index) {
            const data = alphabetData[index];
            document.getElementById('current-index').innerText = index + 1;
            document.getElementById('front-letter').innerText = data.letter;
            document.getElementById('front-ph-fr').innerText = data.nameFr;
            document.getElementById('front-ph-es').innerText = data.nameEs;

            ["fathah", "dammah", "kasrah", "soukoun"].forEach(h => {
                // Recto (Forme isolée en doré)
                document.getElementById(`recto-${h}-form`).innerHTML = `<span class="gold-text">${data[h].form}</span>`;
                
                // Verso (Forme isolée en doré + Mot avec cible en doré)
                document.getElementById(`verso-${h}-form`).innerHTML = `<span class="gold-text">${data[h].form}</span>`;
                document.getElementById(`verso-${h}-ex-ar`).innerHTML = highlightHarakah(data[h].exAr, data[h].form);
                document.getElementById(`verso-${h}-ex-fr`).innerText = data[h].exFr;
                document.getElementById(`verso-${h}-ex-es`).innerText = data[h].exEs;
            });

            document.querySelectorAll('.harakat-col, .verso-col').forEach(c => c.classList.remove('active'));
            document.getElementById('btn-prev').disabled = (index === 0);
            document.getElementById('btn-next').disabled = (index === alphabetData.length - 1);
        }

        function toggleFlip(event) {
            if (event.target.closest('button')) return;
            if (event.target.closest('.harakat-col') && !isFlipped) return;
            if (event.target.closest('.verso-col') && isFlipped) return;
            isFlipped = !isFlipped;
            document.getElementById('flashcard').classList.toggle('is-flipped');
        }

        function activateColumn(el, event) {
            event.stopPropagation();
            const parent = el.closest('.card-face');
            parent.querySelectorAll('.harakat-col, .verso-col').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function playMainAudio(e) { e.stopPropagation(); playAudio(alphabetData[currentIndex].audioMain); }
        function playHarakatAudio(h, e) { e.stopPropagation(); playAudio(alphabetData[currentIndex][h].audio); }
        function playAudio(src) { currentAudio.src = src; currentAudio.play().catch(err => console.log(err)); }

        function nextCard() { if (currentIndex < alphabetData.length - 1) { currentIndex++; renderCard(currentIndex); } }
        function prevCard() { if (currentIndex > 0) { currentIndex--; renderCard(currentIndex); } }

        document.addEventListener('DOMContentLoaded', () => renderCard(0));
    </script>
