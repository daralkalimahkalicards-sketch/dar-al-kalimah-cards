<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>

    <style>
        :root { --burgundy: #5D1828; --gold: #C8A462; --gold-light: #dfc28b; --white: #FFFFFF; --bg-beige: #FAF6F0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg-beige); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Montserrat', sans-serif; padding: 20px; }
        .menu-container { background: var(--burgundy); padding: 50px 40px; border-radius: 16px; box-shadow: 0 15px 35px rgba(93, 24, 40, 0.15); text-align: center; width: 100%; max-width: 450px; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .brand-ar { font-family: "Amiri", serif; font-size: 3.8rem; font-weight: bold; color: var(--gold); margin-bottom: 5px; line-height: 1.1; }
        .app-title { font-family: "Cinzel", serif; font-size: 1.2rem; color: var(--gold-light); letter-spacing: 3px; text-transform: uppercase; font-weight: 500; margin-bottom: 20px; }
        .divider { width: 40px; height: 1px; background-color: var(--gold); margin: 0 auto 30px auto; opacity: 0.6; }
        .instruction-fr { font-size: 1.05rem; font-weight: 500; color: var(--white); margin-bottom: 5px; }
        .instruction-es { font-size: 0.9rem; color: var(--gold-light); font-style: italic; margin-bottom: 35px; }
        .btn-nav { display: block; width: 100%; max-width: 320px; margin: 0 auto 15px auto; padding: 16px; background: transparent; border: 1.5px solid var(--gold); color: var(--gold); border-radius: 50px; text-decoration: none; font-size: 1rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.3s ease; }
        .btn-nav:hover { background-color: rgba(200, 164, 98, 0.1); transform: translateY(-2px); }
        .btn-back { display: block; margin-top: 25px; color: var(--gold-light); text-decoration: none; font-size: 0.85rem; font-style: italic; transition: color 0.3s; }
        .btn-back:hover { color: var(--white); }
        @media (max-width: 480px) { .menu-container { padding: 40px 25px; } .brand-ar { font-size: 3.2rem; } .app-title { font-size: 1.1rem; } .btn-nav { font-size: 0.95rem; padding: 14px; } }
    </style>
</head>
