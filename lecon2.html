
<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dar Al-Kalima - Leçon 2 (Al-Harakat)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           VARIABLES LUXE "DAR AL-KALIMA"
           ========================================= */
        :root {
            --burgundy: #5D1828;
            --burgundy-dark: #3a0f19;
            --gold: #C8A462;
            --gold-light: #dfc28b;
            --white: #FFFFFF;
            --bg-beige: #FAF6F0;
            --text-dark: #2C3E50;
            
            /* COULEURS PÉDAGOGIQUES */
            --color-fatha: #E53935; /* Rouge */
            --color-damma: #1E88E5; /* Bleu */
            --color-kasra: #43A047; /* Vert */
            --color-sukoun: #C8A462; /* Doré */
            
            --shadow-soft: 0 4px 20px rgba(93, 24, 40, 0.06);
            --shadow-card: 0 10px 30px rgba(93, 24, 40, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-beige);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 25px 15px;
        }

        .ar-text { font-family: "Amiri", serif; line-height: 1.4; }
        .serif-text { font-family: "Cinzel", "Georgia", serif; text-align: center; }

        /* =========================================
           HEADER BILINGUE
           ========================================= */
        .header-container {
            background: var(--burgundy);
            width: 100%; max-width: 900px;
            padding: 40px 20px; border-radius: 20px;
            box-shadow: var(--shadow-card);
            text-align: center; margin-bottom: 35px;
            position: relative; /* Pour positionner la maison */
        }
        
        .brand-ar { font-size: 3.5rem; font-weight: 700; color: var(--gold); margin-bottom: 10px; line-height: 1; }
        .app-title { font-size: 1.15rem; color: var(--gold-light); letter-spacing: 4px; text-transform: uppercase; font-weight: 500; margin-bottom: 15px;}
        
        .subtitle-bilingual { color: var(--white); font-size: 0.95rem; margin-bottom: 25px; opacity: 0.9; }
        .subtitle-bilingual span.es { color: var(--gold-light); font-style: italic; margin-left: 5px;}

        .divider { width: 80px; height: 2px; background-color: var(--gold); margin: 0 auto 25px auto; border-radius: 2px; opacity: 0.6;}
        
        /* LA MAISON DE RETOUR AU MENU */
        .home-icon {
            position: absolute;
            top: 25px;
            right: 25px;
            color: var(--gold-light);
            font-size: 1.6rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .home-icon:hover {
            color: var(--gold);
            transform: scale(1.1);
        }

        /* =========================================
           NAVIGATION DES GROUPES
           ========================================= */
        .groups-nav {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
            width: 100%; max-width: 900px; margin-bottom: 40px;
        }
        
        .group-btn {
            background: var(--white); border: 1px solid rgba(200, 164, 98, 0.3); color: var(--burgundy);
            padding: 12px 15px; border-radius: 12px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow-soft);
            font-family: 'Montserrat', sans-serif; flex: 1 1 calc(25% - 10px); min-width: 160px;
            text-align: center;
        }
        .group-btn:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 6px 15px rgba(200, 164, 98, 0.15); }
        .group-btn.active { background: var(--burgundy); color: var(--white); border-color: var(--burgundy); box-shadow: 0 6px 15px rgba(93, 24, 40, 0.2); }

        /* =========================================
           CARTES DE LETTRES
           ========================================= */
        .cards-container {
            width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 50px;
            margin-bottom: 50px;
        }

        .letter-card {
            background: var(--white); border: 1px solid rgba(200, 164, 98, 0.2); border-radius: 24px;
            padding: 40px; box-shadow: var(--shadow-card);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* EN-TÊTE : CENTRAGE ET MICRO À DROITE */
        .letter-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-bottom: 30px;
            min-height: 80px;
        }
        
        .header-left { display: flex; justify-content: flex-start; }
        .header-center { display: flex; justify-content: center; }
        /* On force le conteneur de droite à afficher son élément (le micro) tout à gauche de sa zone */
        .header-right { display: flex; justify-content: flex-start; padding-left: 20px;}
        
        .btn-audio-main {
            background: var(--bg-beige); border: 2px solid var(--gold-light); color: var(--burgundy); 
            width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem;
            cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.3s ease;
            box-shadow: var(--shadow-soft);
        }
        .btn-audio-main:hover { transform: scale(1.1); border-color: var(--gold); background: var(--white); }

        .main-letter { 
            font-size: 6.5rem; color: var(--burgundy); font-weight: bold; line-height: 1; 
            text-shadow: 0 4px 10px rgba(93, 24, 40, 0.05); margin-top: -10px;
        }
        
        .card-divider {
            border: none; border-top: 2px dotted var(--gold-light); opacity: 0.6;
            margin: 0 0 35px 0; width: 100%;
        }

        /* =========================================
           LE TABLEAU (RTL protégé)
           ========================================= */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .harakat-grid {
            display: grid; 
            grid-template-columns: 140px repeat(4, minmax(70px, 1fr));
            gap: 15px; align-items: stretch; text-align: center;
        }
        
        .grid-header { padding-bottom: 15px; }
        .grid-header span.ar-title { font-size: 1.3rem; font-weight: 700; color: var(--burgundy); display: block; margin-bottom: 5px;}
        .grid-header span.fr { font-size: 0.9rem; font-weight: 600; color: var(--text-dark); display: block; margin-bottom: 2px;}
        .grid-header span.es { font-size: 0.8rem; color: #888; font-weight: 400; display: block; font-style: italic;}
        
        /* ÉTIQUETTES : COULEURS PÉDAGOGIQUES */
        .row-label-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
            padding: 15px 10px; border-radius: 16px; border: 1px solid;
        }
        .row-label { font-size: 1.3rem; font-weight: 700; line-height: 1;}
        .row-label-es { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        
        /* Thèmes des étiquettes */
        .theme-fatha { background: rgba(229, 57, 53, 0.08); border-color: rgba(229, 57, 53, 0.3); }
        .theme-fatha .row-label, .theme-fatha .row-label-es { color: var(--color-fatha); }
        
        .theme-damma { background: rgba(30, 136, 229, 0.08); border-color: rgba(30, 136, 229, 0.3); }
        .theme-damma .row-label, .theme-damma .row-label-es { color: var(--color-damma); }
        
        .theme-kasra { background: rgba(67, 160, 71, 0.08); border-color: rgba(67, 160, 71, 0.3); }
        .theme-kasra .row-label, .theme-kasra .row-label-es { color: var(--color-kasra); }
        
        .theme-sukoun { background: rgba(200, 164, 98, 0.08); border-color: rgba(200, 164, 98, 0.4); }
        .theme-sukoun .row-label, .theme-sukoun .row-label-es { color: var(--color-sukoun); }

        .btn-audio-small {
            background: var(--bg-beige); border: 1px solid rgba(200, 164, 98, 0.4); color: var(--burgundy);
            width: 35px; height: 35px; border-radius: 50%; font-size: 1.1rem; margin-top: 5px;
            cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .btn-audio-small:hover { transform: scale(1.1); background: var(--white); }

        /* CARRÉS DES LETTRES : BORDURES PÉDAGOGIQUES */
        .shape-box {
            font-size: 3rem; color: var(--burgundy); padding: 20px 5px;
            background: var(--white); border-radius: 16px; border: 1px solid; 
            transition: all 0.2s ease; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,1), 0 4px 10px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        /* Thèmes des cases des lettres */
        .box-fatha { border-color: rgba(229, 57, 53, 0.3); }
        .box-fatha:hover { border-color: var(--color-fatha); background: rgba(229, 57, 53, 0.05); color: var(--color-fatha); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(229, 57, 53, 0.15); }
        
        .box-damma { border-color: rgba(30, 136, 229, 0.3); }
        .box-damma:hover { border-color: var(--color-damma); background: rgba(30, 136, 229, 0.05); color: var(--color-damma); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(30, 136, 229, 0.15); }
        
        .box-kasra { border-color: rgba(67, 160, 71, 0.3); }
        .box-kasra:hover { border-color: var(--color-kasra); background: rgba(67, 160, 71, 0.05); color: var(--color-kasra); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(67, 160, 71, 0.15); }
        
        .box-sukoun { border-color: rgba(200, 164, 98, 0.4); }
        .box-sukoun:hover { border-color: var(--color-sukoun); background: rgba(200, 164, 98, 0.05); color: var(--color-sukoun); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(200, 164, 98, 0.2); }

           RESPONSIVE MOBILE
           ========================================= */
        @media (max-width: 768px) {
            .harakat-grid { grid-template-columns: 110px repeat(4, 1fr); gap: 10px; }
            .shape-box { font-size: 2.5rem; padding: 15px 5px; }
            .group-btn { flex: 1 1 calc(50% - 10px); }
            .main-letter { font-size: 5rem; }
            .letter-card { padding: 30px 20px; }
        }
        @media (max-width: 480px) {
            .header-container { padding: 35px 15px; border-radius: 0 0 20px 20px;}
            .brand-ar { font-size: 3rem; }
            .app-title { font-size: 1rem; letter-spacing: 2px;}
            .home-icon { top: 15px; right: 15px; } /* Ajustement mobile de la maison */
            
            .harakat-grid { grid-template-columns: 90px repeat(4, minmax(60px, 1fr)); gap: 6px;}
            .shape-box { font-size: 2rem; padding: 12px 2px; border-radius: 10px;}
            .grid-header span.ar-title { font-size: 1rem; }
            .grid-header span.fr { font-size: 0.75rem; }
            .grid-header span.es { font-size: 0.65rem; }
            .row-label-container { padding: 10px 2px; border-radius: 10px;}
            .row-label { font-size: 0.95rem; }
            .row-label-es { font-size: 0.65rem; letter-spacing: 0;}
            .btn-audio-small { width: 28px; height: 28px; font-size: 0.9rem; margin-top: 2px;}
            
            .main-letter { font-size: 4.5rem; margin-top: -5px;}
            .btn-audio-main { width: 45px; height: 45px; font-size: 1.2rem; }
            .letter-card { padding: 25px 12px; border-radius: 16px;}
            .cards-container { gap: 30px; }
            .header-right { padding-left: 0;} /* Ajustement micro sur mobile */
        }
    </style>
</head>

            for (let i = 1; i <= 8; i++) {
                const btn = document.createElement('button');
                btn.className = 'group-btn';
                if (i === 1) btn.classList.add('active');
                btn.innerText = `Groupe ${i} / Grupo ${i}`;
                btn.onclick = () => {
                    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showGroup(i);
                };
                nav.appendChild(btn);
            }
        }

            if (!audioPath || audioPath === "") return;
            currentAudio.pause();
            currentAudio.currentTime = 0;
