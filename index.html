<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalicards - Module 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --burgundy: #5D1828;
            --burgundy-dark: #3a0f19;
            --gold: #C8A462;
            --gold-light: #dfc28b;
            --white: #FFFFFF;
            --bg-beige: #FAF6F0;
            --shadow-soft: 0 15px 35px rgba(93, 24, 40, 0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-beige);
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg-beige) 80%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Montserrat', system-ui, sans-serif;
            padding: 20px; overflow-x: hidden; color: var(--burgundy);
        }
        .ar-text { font-family: "Amiri", serif; line-height: 1.2; direction: rtl; }
        .serif-text { font-family: "Cinzel", "Georgia", serif; }
        .menu-container {
            text-align: center; background: linear-gradient(145deg, var(--white), #fdfdfd);
            padding: 50px 40px; border-radius: 24px; border: 1px solid var(--gold);
            box-shadow: inset 0 0 0 5px var(--white), inset 0 0 0 6px var(--gold-light), var(--shadow-soft);
            max-width: 600px; width: 100%;
            animation: floatIn 0.5s ease-out forwards;
        }
        @keyframes floatIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .brand-ar { font-size: 3.5rem; font-weight: bold; color: var(--burgundy); margin-bottom: 5px; }
        .app-title { font-size: 1.6rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 25px;}
        .divider { width: 60px; height: 2px; background-color: var(--gold); margin: 25px auto; border-radius: 2px; }
        .subtitle-group { margin-bottom: 35px; }
        .subtitle { font-size: 1.05rem; font-weight: 500; margin-bottom: 5px; }
        .subtitle.es { font-size: 0.95rem; opacity: 0.8; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn-main {
            background: linear-gradient(135deg, var(--burgundy), var(--burgundy-dark));
            color: var(--white); border: 2px solid var(--burgundy);
            padding: 16px 45px; font-size: 1.05rem; border-radius: 50px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: 'Montserrat', sans-serif; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(93, 24, 40, 0.25); text-decoration: none;
            width: 100%; max-width: 350px; display: block;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(93, 24, 40, 0.35); border-color: var(--gold); }
        .btn-main:active { transform: translateY(1px); }
        @media (max-width: 480px) {
            .brand-ar { font-size: 3rem; }
            .app-title { font-size: 1.3rem; }
            .menu-container { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="brand-ar ar-text">دار الكلمة</div>
        <div class="app-title serif-text">Kalicards – Module 1</div>
        <div class="divider"></div>
        
        <div class="subtitle-group">
            <p class="subtitle fr">Sélectionnez une activité</p>
            <p class="subtitle es">Selecciona una actividad</p>
        </div>
        
        <div class="btn-group">
            <a href="lecon.html" class="btn-main">La leçon</a>
            <a href="quiz1.html" class="btn-main">Quiz 1</a>
            <a href="quiz2.html" class="btn-main">Quiz 2</a>
            <a href="quiz3.html" class="btn-main">Quiz 3</a>
        </div>
    </div>
</body>
</html>
