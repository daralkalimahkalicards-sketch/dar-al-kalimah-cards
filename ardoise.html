
<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dar Al-Kalima - La السبورة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --burgundy: #5D1828; --burgundy-dark: #3a0f19;
            --gold: #C8A462; --gold-light: #dfc28b;
            --white: #FFFFFF; --bg-beige: #FAF6F0;
            --text-dark: #2C3E50; --text-muted: #7F8C8D;
            --shadow-elegant: 0 4px 15px rgba(93, 24, 40, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-beige);
            background-image: linear-gradient(135deg, var(--white) 0%, var(--bg-beige) 100%);
            font-family: 'Montserrat', sans-serif;
            padding: 30px 15px; color: var(--text-dark);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* HEADER PREMIUM (Fond Bordeaux) */
        .header-container {
            background: var(--burgundy); /* Modification principale : le fond passe en Bordeaux */
            padding: 25px 30px; border-radius: 12px;
            box-shadow: 0 8px 25px rgba(93, 24, 40, 0.25);
            width: 100%; max-width: 900px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* BOUTON MENU (Avec bordure dorée comme sur la photo) */
        .btn-back-home {
            background: transparent; 
            border: 1px solid var(--gold); 
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-back-home:hover {
            background: rgba(200, 164, 98, 0.1);
        }

        /* TITRES EN OR (Pour contraster avec le fond bordeaux) */
        .title-wrapper { text-align: center; }
        
        .ar-title { 
            font-family: "Amiri", serif; font-size: 2.4rem; font-weight: bold; 
            color: var(--gold); 
            margin-bottom: 2px; line-height: 1;
        }

        .brand-title {
            font-family: "Cinzel", serif; font-size: 1.1rem; font-weight: 600;
            color: #d09470; /* Un or légèrement rosé/cuivré pour rappeler ta photo */
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
        }

        .fr-title { 
            font-family: "Cinzel", serif; font-size: 1rem; 
            color: var(--gold); 
            letter-spacing: 2px; text-transform: uppercase; font-weight: 600; display: block;
        }

        .es-title { 
            font-family: 'Montserrat', sans-serif; font-size: 0.85rem; 
            color: var(--gold-light); opacity: 0.9;
            font-style: italic; margin-top: 4px; display: block;
        }

        /* ARDOISE LIBRE */
        .slate-wrapper {
            background: var(--white); border: 1px solid var(--gold-light); border-radius: 12px;
            width: 100%; max-width: 900px; flex-grow: 1; display: flex; flex-direction: column;
            box-shadow: var(--shadow-elegant); padding: 20px; margin-bottom: 20px;
        }

        /* Instructions au-dessus de l'ardoise (Couleur dorée comme sur ta photo) */
        .instructions { text-align: center; color: var(--gold); font-size: 0.95rem; font-weight: 500; margin-bottom: 15px; }
        
        .slate-container {
            width: 100%; flex-grow: 1; border: 1px solid #E5E7EB; border-radius: 8px;
            background-color: var(--white); position: relative; overflow: hidden; min-height: 50vh;
        }
        
        canvas.slate-canvas {
            width: 100%; height: 100%; cursor: crosshair; touch-action: none; display: block;
            background-image: repeating-linear-gradient(transparent, transparent 48px, var(--bg-beige) 49px, var(--bg-beige) 50px);
        }

        /* BOUTON EFFACER */
        .controls { display: flex; justify-content: center; margin-top: 20px; }
        .btn-clear {
            background: var(--burgundy); color: var(--white); border: none; padding: 12px 35px;
            border-radius: 50px; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: background 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .btn-clear:hover { background: var(--burgundy-dark); }
        
        @media (max-width: 600px) {
            .header-container { flex-direction: column; gap: 15px; padding: 20px; }
            .btn-back-home { position: absolute; top: 20px; right: 20px; border: none; font-size: 0.75rem;}
            .slate-container { min-height: 60vh; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="index.html" class="btn-back-home"><i class="fa-solid fa-arrow-left"></i> Menu / Menú</a>
        
        <div class="title-wrapper">
            <div class="ar-title">سبورة دار الكلمة</div>
            <div class="brand-title">Dar Al-Kalima</div>
            <div class="fr-title">L'Ardoise Libre</div>
            <div class="es-title">La pizarra libre</div>
        </div>
        
        <div style="width: 130px;"></div> </div>

    <div class="slate-wrapper">
        <div class="instructions">
            Espace d'entraînement libre. <span style="font-style: italic; opacity: 0.8;">Espacio de entrenamiento libre.</span>
        </div>
        
        <div class="slate-container">
            <canvas id="free-slate" class="slate-canvas"></canvas>
        </div>
        
        <div class="controls">
            <button class="btn-clear" onclick="clearSlate()">
                <i class="fa-solid fa-eraser"></i> Effacer tout / Borrar todo
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("free-slate");
        const ctx = canvas.getContext("2d");
        let isDrawing = false; let lastX = 0; let lastY = 0;

        function initCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            ctx.lineWidth = 8; 
            ctx.lineCap = "round"; 
            ctx.lineJoin = "round"; 
            ctx.strokeStyle = "#5D1828"; // Encre bordeaux
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startPosition(e) { 
            isDrawing = true; 
            const pos = getPos(e); 
            lastX = pos.x; 
            lastY = pos.y; 
        }
        
        function endPosition() { 
            isDrawing = false; 
            ctx.beginPath(); 
        }
        
        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); 
            const pos = getPos(e);
            ctx.beginPath(); 
            ctx.moveTo(lastX, lastY); 
            ctx.lineTo(pos.x, pos.y); 
            ctx.stroke();
            lastX = pos.x; 
            lastY = pos.y;
        }

        function clearSlate() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
        }

        canvas.addEventListener("mousedown", startPosition); 
        canvas.addEventListener("mouseup", endPosition);
        canvas.addEventListener("mousemove", draw); 
        canvas.addEventListener("mouseout", endPosition);
        
        canvas.addEventListener("touchstart", startPosition, { passive: false }); 
        canvas.addEventListener("touchend", endPosition);
        canvas.addEventListener("touchmove", draw, { passive: false });
        
        window.addEventListener("resize", initCanvas);
        window.addEventListener("load", initCanvas);
        
        setTimeout(initCanvas, 100);
    </script>
</body>
</html>
