<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dar Al-Kalimah - Quiz 3 (Module 2)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="database.js"></script>
    
    <style>
        :root {
            --burgundy: #5D1828; --burgundy-dark: #3a0f19;
            --gold: #C8A462; --gold-light: #dfc28b;
            --white: #FFFFFF; --bg-beige: #FAF6F0;
            --success-green: #e8f5e9; --success-border: #4CAF50;
            --error-red: #ffebee; --error-border: #f44336;
            --shadow-soft: 0 15px 35px rgba(93, 24, 40, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-beige);
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg-beige) 80%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Montserrat', system-ui, sans-serif;
            padding: 20px; color: var(--burgundy);
        }

        .ar-text { font-family: "Amiri", serif; line-height: 1.2; direction: rtl; }
        .serif-text { font-family: "Cinzel", "Georgia", serif; }
        .view { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: floatIn 0.5s ease-out forwards; }
        .hidden { display: none !important; }
        @keyframes floatIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-main, .btn-secondary, .btn-link {
            background: linear-gradient(135deg, var(--burgundy), var(--burgundy-dark)); color: var(--white); border: 2px solid var(--burgundy);
            padding: 16px 45px; font-size: 1.05rem; border-radius: 50px; cursor: pointer; transition: all 0.3s;
            font-family: 'Montserrat', sans-serif; font-weight: 600; text-transform: uppercase; text-align: center; text-decoration: none;
        }
        .btn-main:hover, .btn-link:hover { transform: translateY(-3px); border-color: var(--gold); }
        .btn-secondary { background: var(--bg-beige); color: var(--burgundy); border-color: var(--gold); }
        .btn-secondary:hover { background: var(--gold); color: var(--white); }
        .btn-back-menu { display: block; margin-top: 25px; color: var(--gold-light); text-decoration: none; font-size: 0.9rem; font-style: italic; }

        .menu-container, .quiz-container { text-align: center; background: var(--burgundy); padding: 50px 40px; border-radius: 24px; box-shadow: 0 8px 25px rgba(93, 24, 40, 0.25); max-width: 600px; width: 100%; }
        .quiz-container { background: var(--white); border: 1px solid var(--gold); }
        .brand-ar { font-size: 3.5rem; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .app-title { font-size: 1.3rem; color: #d09470; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; color: var(--gold-light);}
        .divider { width: 60px; height: 2px; background-color: var(--gold); margin: 25px auto; opacity: 0.5; }
        .subtitle { font-size: 1.05rem; font-weight: 500; color: var(--white); margin-bottom: 5px;}
        .subtitle.es { font-size: 0.95rem; color: var(--gold-light); font-style: italic; margin-bottom: 30px;}

        .input-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 35px; }
        .input-group input { width: 100%; max-width: 350px; padding: 15px; font-size: 1.1rem; text-align: center; border: 2px solid var(--gold); border-radius: 12px; }
        .menu-container .btn-main { background: transparent; color: var(--gold); border: 2px solid var(--gold); }
        .menu-container .btn-main:hover { background-color: rgba(200, 164, 98, 0.1); }

        .quiz-header { width: 100%; margin-bottom: 20px; text-align: right; }
        .progress-text { font-weight: 700; color: var(--burgundy); }
        .progress-bar-container { width: 100%; height: 8px; background-color: var(--white); border: 1px solid var(--gold-light); border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background-color: var(--gold); width: 0%; transition: 0.4s; }

        .instruction-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 20px; color: var(--burgundy); }
        .question-focus { background: var(--bg-beige); border-radius: 16px; padding: 25px; margin-bottom: 30px; border: 2px dashed var(--gold-light); font-size: 4rem; font-weight: bold;}
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-card { background: var(--white); border: 2px solid var(--gold-light); border-radius: 16px; padding: 20px 10px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: 600; color: var(--burgundy); cursor: pointer; transition: 0.2s; }
        .option-card:hover { transform: translateY(-3px); border-color: var(--gold); }
        .option-card.correct { border: 3px solid var(--success-border) !important; background-color: var(--success-green); color: var(--success-border); pointer-events: none; }
        .option-card.wrong { border: 3px solid var(--error-border) !important; background-color: var(--error-red); pointer-events: none; opacity: 0.7; }

        .diploma-paper { background: #fff; border: 8px double var(--gold); padding: 40px; border-radius: 16px; text-align: center; max-width: 500px; width: 100%; margin-bottom: 30px; }
        .cert-ar { font-size: 4.5rem; color: var(--gold); margin-bottom: 10px; }
        .cert-title { color: var(--burgundy); font-size: 2rem; margin-bottom: 20px; }
        .cert-name { font-size: 3rem; color: var(--burgundy); border-bottom: 1px solid var(--gold-light); padding-bottom: 10px; margin-bottom: 25px; }
        .score-value { font-size: 1.8rem; font-weight: bold; color: var(--burgundy); }
        .cert-actions { display: flex; gap: 15px; justify-content: center; }

        @media (max-width: 600px) { .menu-container, .quiz-container { padding: 30px 20px; } .question-focus { font-size: 3rem; } .cert-name { font-size: 2rem; } .cert-actions { flex-direction: column; } }
    </style>
</head>
<body>

    <div id="view-welcome" class="view">
        <div class="menu-container">
            <div class="brand-ar ar-text">تَرْجَمَة</div>
            <div class="app-title serif-text">Kalicards – Module 2</div>
            <div class="subtitle">QUIZ 3 : Traduction (Harakat)</div>
            <div class="subtitle es">Traduce las palabras cortas.</div>
            <div class="divider"></div>
            <div class="input-group">
                <input type="text" id="player-name" placeholder="Nom du participant" autocomplete="off">
            </div>
            <button class="btn-main" onclick="startQuiz()">Commencer</button>
            <a href="modules.html" class="btn-back-menu">← Retour au menu</a>
        </div>
    </div>

    <div id="view-quiz" class="view hidden">
        <div class="quiz-header">
            <div class="progress-info"><span id="progress-text" class="progress-text">1 / X</span></div>
            <div class="progress-bar-container"><div id="progress-fill" class="progress-bar-fill"></div></div>
        </div>
        <div class="quiz-container">
            <div class="instruction-text">Que signifie ce mot ?</div>
            <div class="question-focus ar-text" id="question-word"></div>
            <div class="options-grid" id="options-grid"></div>
        </div>
    </div>

    <div id="view-certificate" class="view hidden">
        <div class="diploma-paper">
            <div class="cert-ar ar-text">مبروك</div>
            <h2 class="cert-title serif-text">Certificat de réussite</h2>
            <div id="cert-name" class="cert-name ar-text">Participant</div>
            <div class="score-value" id="cert-score">0 / 0</div>
        </div>
        <div class="cert-actions">
            <button class="btn-main" onclick="restartQuiz()">Recommencer ↺</button>
            <a href="modules.html" class="btn-link">Menu Principal</a>
        </div>
    </div>

    <script>
        let playerName = ""; let questions = []; let currentQuestionIndex = 0; let score = 0; let isAnswerProcessing = false; let wordData = [];

        function initQuizData() {
            // LE FILTRE MAGIQUE : Uniquement les mots entre 101 et 148 (Module 2 STRICT, sans Modoud)
            wordData = wordsDatabase.filter(item => item.type === "word" && item.id >= 101 && item.id <= 148);
        }

        function startQuiz() {
            playerName = document.getElementById('player-name').value.trim() || "Participant";
            initQuizData();
            score = 0; currentQuestionIndex = 0;
            generateQuestions();
            document.getElementById('view-welcome').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            loadQuestion();
        }

        function generateQuestions() {
            questions = [];
            let shuffledData = [...wordData].sort(() => Math.random() - 0.5).slice(0, 15); // Prend 15 mots au hasard
            shuffledData.forEach(targetObj => {
                let distractors = wordData.filter(item => item.arabe !== targetObj.arabe).sort(() => Math.random() - 0.5).slice(0, 3);
                let options = [targetObj, distractors[0], distractors[1], distractors[2]].sort(() => Math.random() - 0.5);
                questions.push({ target: targetObj, options: options });
            });
        }

        function loadQuestion() {
            isAnswerProcessing = false;
            const currentQ = questions[currentQuestionIndex];
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('progress-fill').style.width = `${(currentQuestionIndex / questions.length) * 100}%`;
            document.getElementById('question-word').innerText = currentQ.target.arabe;
            
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = "";
            currentQ.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option-card';
                btn.innerHTML = `${opt.fr}<br><span style="font-size:0.8rem; color:#777;">${opt.es}</span>`;
                btn.onclick = () => handleAnswer(opt.arabe, btn, currentQ.target.arabe);
                optionsGrid.appendChild(btn);
            });
        }

        function handleAnswer(selected, cardElement, target) {
            if (isAnswerProcessing) return;
            isAnswerProcessing = true;
            if (selected === target) { score++; cardElement.classList.add('correct'); } 
            else { cardElement.classList.add('wrong'); }
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < questions.length) loadQuestion();
                else finishQuiz();
            }, 1000);
        }

        function finishQuiz() {
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-certificate').classList.remove('hidden');
            document.getElementById('progress-fill').style.width = `100%`;
            document.getElementById('cert-name').innerText = playerName;
            document.getElementById('cert-score').innerText = `${score} / ${questions.length}`;
            
            triggerConfetti();
            
            // LE SON MABROUK EST ICI !
            const mabrukAudio = new Audio("audio/mabruk.mp3");
            mabrukAudio.play().catch(e => console.log("Audio bloqué:", e));
        }

        function triggerConfetti() {
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#C8A462', '#5D1828'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#C8A462', '#5D1828'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function restartQuiz() {
            document.getElementById('view-certificate').classList.add('hidden');
            document.getElementById('view-welcome').classList.remove('hidden');
        }
    </script>
</body>
</html>
