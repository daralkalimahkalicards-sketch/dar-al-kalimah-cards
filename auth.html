<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/dar-al-kalimah-cards/manifest.json">
  <meta name="theme-color" content="#5D1828">
  <link rel="apple-touch-icon" href="/dar-al-kalimah-cards/icons/icon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dar Al-Kalimah — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --burgundy: #5D1828; --gold: #C8A462; --white: #FFFFFF; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    width: 100%;
    background: var(--burgundy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    padding: 20px;
  }
  .auth-card {
    background: linear-gradient(145deg, var(--burgundy), #3d0f1a);
    border: 1px solid rgba(200,164,98,0.4);
    border-radius: 20px;
    padding: 50px 40px;
    width: 100%;
    max-width: 480px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(93,24,40,0.3);
    position: relative;
    overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(200,164,98,0.2);
    border-radius: 12px;
    pointer-events: none;
  }
  .brand-ar { font-family: 'Amiri', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 5px; }
  .brand-en { font-family: 'Cinzel', serif; font-size: 0.85rem; color: rgba(200,164,98,0.7); letter-spacing: 3px; margin-bottom: 30px; }
  .divider { width: 60px; height: 1px; background: var(--gold); margin: 0 auto 30px; opacity: 0.6; }
  .tabs { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.05); border-radius: 50px; padding: 4px; }
  .tab { flex: 1; padding: 10px; border: none; border-radius: 50px; background: transparent; color: rgba(255,255,255,0.5); font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.3s; }
  .tab.active { background: var(--gold); color: var(--burgundy); font-weight: 700; }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; color: rgba(200,164,98,0.8); font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 14px 18px; border: 1.5px solid rgba(200,164,98,0.3); border-radius: 50px; background: rgba(255,255,255,0.08); color: var(--white); font-family: 'Montserrat', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.3s; }
  .form-group input:focus { border-color: var(--gold); }
  .form-group input::placeholder { color: rgba(255,255,255,0.3); }
  .btn-main { width: 100%; padding: 16px; background: var(--gold); color: var(--burgundy); border: none; border-radius: 50px; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
  .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
  .msg { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 0.85rem; display: none; }
  .msg.error { background: rgba(255,80,80,0.2); color: #ff9999; display: block; }
  .msg.success { background: rgba(80,200,80,0.2); color: #90ee90; display: block; }
  .form-panel { display: none; }
  .form-panel.active { display: block; }
  .user-info { display: none; text-align: center; }
  .user-name { color: var(--gold); font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .user-email { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 24px; }
  .btn-secondary { width: 100%; padding: 14px; background: transparent; color: rgba(200,164,98,0.7); border: 1px solid rgba(200,164,98,0.3); border-radius: 50px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; cursor: pointer; margin-top: 10px; transition: all 0.3s; }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  @media (max-width: 480px) { .auth-card { padding: 40px 24px; } .brand-ar { font-size: 2rem; } }
</style>
</head>
<body>
<div class="auth-card">
  <div class="brand-ar">دار الكلمة</div>
  <div class="brand-en">DAR AL-KALIMAH</div>
  <div class="divider"></div>

  <!-- SI DÉJÀ CONNECTÉ -->
  <div class="user-info" id="user-info">
    <div class="user-name" id="user-display-name"></div>
    <div class="user-email" id="user-display-email"></div>
    <button class="btn-main" onclick="goToApp()">▶ Continuer l'apprentissage</button>
    <button class="btn-secondary" onclick="logout()">Se déconnecter</button>
  </div>

  <!-- FORMULAIRES -->
  <div id="auth-forms">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Connexion</button>
      <button class="tab" onclick="switchTab('register')">Inscription</button>
    </div>

    <!-- CONNEXION -->
    <div id="panel-login" class="form-panel active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="ton@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn-main" onclick="login()">Se connecter</button>
      <div id="login-msg" class="msg"></div>
    </div>

    <!-- INSCRIPTION -->
    <div id="panel-register" class="form-panel">
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" id="reg-name" placeholder="Ton prénom">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="ton@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="reg-password" placeholder="Minimum 6 caractères" onkeydown="if(event.key==='Enter')register()">
      </div>
      <button class="btn-main" onclick="register()">Créer mon compte</button>
      <div id="reg-msg" class="msg"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut, deleteUser, onAuthStateChanged, browserLocalPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBz5vRQUf4N7Px0YR4csyOlk72s1eOLLHQ",
  authDomain: "dar-al-kalimah.firebaseapp.com",
  projectId: "dar-al-kalimah",
  storageBucket: "dar-al-kalimah.firebasestorage.app",
  messagingSenderId: "472629258",
  appId: "1:472629258:web:29b755d38efe89421f1ff3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Persistance locale — l'élève reste connecté même après fermeture du navigateur
await setPersistence(auth, browserLocalPersistence);

// Vérifier si déjà connecté
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('auth-forms').style.display = 'none';
    document.getElementById('user-info').style.display = 'block';
    document.getElementById('user-display-name').textContent = '👋 Bonjour ' + (user.displayName || '');
    document.getElementById('user-display-email').textContent = user.email;
  }
});

window.switchTab = (tab) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
};

window.goToApp = () => { window.location.href = 'index.html'; };

window.login = async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const msg = document.getElementById('login-msg');
  try {
    await signInWithEmailAndPassword(auth, email, password);
    msg.className = 'msg success';
    msg.textContent = '✅ Connexion réussie ! Redirection...';
    setTimeout(() => window.location.href = 'index.html', 1200);
  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = '❌ Email ou mot de passe incorrect.';
  }
};

window.register = async () => {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const msg = document.getElementById('reg-msg');
  if (!name) { msg.className='msg error'; msg.textContent='❌ Entre ton prénom.'; return; }
  if (password.length < 6) { msg.className='msg error'; msg.textContent='❌ Mot de passe trop court (6 caractères minimum).'; return; }

  try {
    // 1. Créer le compte Firebase Auth
    const cred = await createUserWithEmailAndPassword(auth, email, password);

    // 2. Vérifier (en tant qu'utilisateur connecté) si l'email est autorisé
    let autorise = false;
    try {
      const q = query(collection(db, 'emails_autorises'), where('email', '==', email));
      const snap = await getDocs(q);
      autorise = !snap.empty;
    } catch(e) {
      // Si erreur de lecture (règles restrictives), on bloque par sécurité
      autorise = false;
    }

    if (!autorise) {
      // Email non autorisé → supprimer le compte créé
      await deleteUser(cred.user);
      await signOut(auth);
      msg.className = 'msg error';
      msg.textContent = '❌ Ton email n\'est pas encore autorisé. Contacte Houda pour accéder à la plateforme.';
      return;
    }

    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'eleves', cred.user.uid), {
      nom: name,
      email: email,
      dateInscription: serverTimestamp(),
      dernierAcces: serverTimestamp()
    });
    msg.className = 'msg success';
    msg.textContent = '✅ Compte créé ! Redirection...';
    setTimeout(() => window.location.href = 'index.html', 1200);
  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = e.code === 'auth/email-already-in-use'
      ? '❌ Email déjà utilisé. Connecte-toi.'
      : '❌ Erreur : ' + e.message;
  }
};

window.logout = async () => {
  await signOut(auth);
  document.getElementById('auth-forms').style.display = 'block';
  document.getElementById('user-info').style.display = 'none';
};
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/dar-al-kalimah-cards/sw.js');}</script>
</body>
</html>
