
<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalicards - Module 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --burgundy: #5D1828;
            --burgundy-dark: #3a0f19;
            --gold: #C8A462;
            --gold-light: #dfc28b;
            --white: #FFFFFF;
            --bg-beige: #FAF6F0;
            --shadow-soft: 0 15px 35px rgba(93, 24, 40, 0.08);
            --shadow-deep: 0 8px 25px rgba(93, 24, 40, 0.25);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-beige);
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg-beige) 80%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Montserrat', system-ui, sans-serif;
            padding: 20px; overflow-x: hidden; color: var(--burgundy);
        }
        .ar-text { font-family: "Amiri", serif; line-height: 1.2; direction: rtl; }
        .serif-text { font-family: "Cinzel", "Georgia", serif; }
        
        /* =========================================
           MENU CONTAINER (STYLE PREMIUM BORDEAUX)
           ========================================= */
        .menu-container {
            text-align: center; 
            background: var(--burgundy); /* Fond bordeaux */
            padding: 50px 40px; border-radius: 24px;
            box-shadow: var(--shadow-deep);
            max-width: 600px; width: 100%;
            animation: floatIn 0.5s ease-out forwards;
        }
        @keyframes floatIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .brand-ar { font-size: 3.5rem; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .app-title { font-size: 1.6rem; color: #d09470; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase;}
        .divider { width: 60px; height: 2px; background-color: var(--gold); margin: 25px auto; border-radius: 2px; opacity: 0.5;}
        
        .subtitle-group { margin-bottom: 35px; }
        .subtitle { font-size: 1.05rem; font-weight: 500; margin-bottom: 5px; color: var(--white); }
        .subtitle.es { font-size: 0.95rem; opacity: 0.9; color: var(--gold-light); font-style: italic; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        /* BOUTONS DORÉS SUR FOND BORDEAUX */
        .btn-main {
            background: transparent;
            color: var(--gold); border: 2px solid var(--gold);
            padding: 16px 45px; font-size: 1.05rem; border-radius: 50px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: 'Montserrat', sans-serif; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            text-decoration: none;
            width: 100%; max-width: 350px; display: block;
        }
        .btn-main:hover { 
            background-color: rgba(200, 164, 98, 0.1); /* Effet lumineux doré au survol */
            transform: translateY(-3px); 
            border-color: var(--gold-light); 
            color: var(--gold-light);
        }
        .btn-main:active { transform: translateY(1px); }
        
        @media (max-width: 480px) {
            .brand-ar { font-size: 3rem; }
            .app-title { font-size: 1.3rem; }
            .menu-container { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="brand-ar ar-text">دار الكلمة</div>
        <div class="app-title serif-text">Kalicards – Module 1</div>
        <div class="divider"></div>
        
        <div class="subtitle-group">
            <p class="subtitle fr">Sélectionnez une activité</p>
            <p class="subtitle es">Selecciona una actividad</p>
        </div>
        
        <div class="btn-group">
            <a href="lecon.html" class="btn-main">La leçon</a>
            <a href="quiz1.html" class="btn-main">Quiz 1</a>
            <a href="quiz2.html" class="btn-main">Quiz 2</a>
            <a href="quiz3.html" class="btn-main">Quiz 3</a>
        </div>
    </div>
</body>
</html>
