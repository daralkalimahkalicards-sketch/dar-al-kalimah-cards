
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dar Al-Kalima - Ardoise de Dictée</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           LE COFFRE-FORT : VARIABLES PREMIUM
           ========================================= */
        :root {
            --burgundy: #5D1828; --burgundy-dark: #3a0f19;
            --gold: #C8A462; --gold-light: #dfc28b;
            --white: #FFFFFF; --bg-beige: #FAF6F0;
            --text-dark: #2C3E50; --text-muted: #7F8C8D;
            --shadow-elegant: 0 4px 15px rgba(93, 24, 40, 0.05);
            --shadow-deep: 0 8px 25px rgba(93, 24, 40, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-beige);
            background-image: linear-gradient(135deg, var(--white) 0%, var(--bg-beige) 100%);
            font-family: 'Montserrat', sans-serif;
            padding: 30px 15px; color: var(--text-dark);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .ar-text { font-family: "Noto Naskh Arabic", "Amiri", serif; direction: rtl; }
        .serif-text { font-family: "Cinzel", "Georgia", serif; }

        /* HEADER */
        .header-container {
            background: var(--burgundy); padding: 30px 20px; border-radius: 16px;
            box-shadow: var(--shadow-deep); width: 100%; max-width: 1000px; margin-bottom: 30px;
            text-align: center; position: relative;
        }
        .btn-back-home {
            position: absolute; top: 20px; right: 20px;
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 8px 20px; border-radius: 25px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-back-home:hover { background: rgba(200, 164, 98, 0.1); }
        .brand-ar { font-size: 2.5rem; font-weight: bold; color: var(--gold); margin-bottom: 5px; line-height: 1.2; }
        .brand-fr-es { font-size: 1.1rem; color: var(--gold-light); letter-spacing: 1px; margin-bottom: 8px; }
        .app-title { font-size: 1rem; color: #d09470; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px;}
        .trilingual-title { display: flex; justify-content: center; gap: 15px; color: var(--white); font-size: 0.9rem; flex-wrap: wrap; border-top: 1px solid rgba(200,164,98,0.3); padding-top: 15px;}

        /* SECTION ARDOISE LIBRE */
        .module-section {
            background: var(--white); border: 1px solid var(--gold-light); border-radius: 16px;
            width: 100%; max-width: 1000px; padding: 30px; box-shadow: var(--shadow-elegant);
            flex-grow: 1; display: flex; flex-direction: column;
        }

        .slate-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;}
        .slate-title { font-size: 1.3rem; font-weight: 700; color: var(--burgundy); }
        .slate-title span { display: block; font-size: 0.9rem; color: var(--text-muted); font-weight: 500; font-style: italic; margin-top: 3px;}
        
        .slate-controls { display: flex; gap: 10px; }
        .btn-slate {
            background: var(--burgundy); border: 1px solid var(--burgundy); color: var(--white);
            padding: 12px 25px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-family: 'Montserrat', sans-serif;
        }
        .btn-slate:hover { background: var(--burgundy-dark); box-shadow: 0 4px 10px rgba(93, 24, 40, 0.2); }

        .slate-container {
            width: 100%; flex-grow: 1; min-height: 500px; border: 3px solid var(--gold); border-radius: 12px;
            background-color: var(--white); position: relative; overflow: hidden; box-shadow: inset 0 4px 15px rgba(0,0,0,0.05);
            background-image: repeating-linear-gradient(transparent, transparent 48px, var(--bg-beige) 49px, var(--bg-beige) 50px);
            margin-bottom: 10px;
        }

        canvas.slate-canvas {
            width: 100%; height: 100%; cursor: crosshair; touch-action: none;
            position: absolute; top: 0; left: 0; z-index: 2; background: transparent;
        }

        @media (max-width: 768px) {
            .header-container { padding: 25px 15px; }
            .btn-back-home { position: static; display: inline-flex; justify-content: center; margin-bottom: 20px; }
            .slate-header { flex-direction: column; align-items: center; text-align: center; }
            .slate-container { min-height: 400px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="index.html" class="btn-back-home"><i class="fa-solid fa-arrow-right"></i> القائمة / Menu</a>
        <div class="brand-ar ar-text">اللوح الحر</div>
        <div class="brand-fr-es serif-text">L'Ardoise Libre | La Pizarra Libre</div>
        <div class="app-title serif-text">Dar Al-Kalima</div>
        <div class="trilingual-title">
            <span>إملاء وتدريب</span> | <span>Dictée & Entraînement</span> | <span>Dictado & Práctica</span>
        </div>
    </div>

    <div class="module-section">
        <div class="slate-header">
            <div class="slate-title ar-text">
                مساحة الإملاء <span>Espace Dictée / Espacio de Dictado</span>
            </div>
            <div class="slate-controls">
                <button class="btn-slate" onclick="clearSlate()"><i class="fa-solid fa-eraser"></i> مسح / Effacer / Borrar</button>
            </div>
        </div>
        
        <div class="slate-container">
            <canvas id="slate-canvas" class="slate-canvas"></canvas>
        </div>
    </div>

    <script>
        // =========================================
        // MOTEUR DE DESSIN (ARDOISE LIBRE)
        // =========================================
        const canvas = document.getElementById("slate-canvas");
        const ctx = canvas.getContext("2d");
        let isDrawing = false; 
        let lastX = 0; 
        let lastY = 0;

        function resizeCanvas() {
            // Ajuste la taille du canvas à la taille de son conteneur
            canvas.width = canvas.offsetWidth; 
            canvas.height = canvas.offsetHeight;
            
            // Style du stylo (Bordeaux premium Dar Al-Kalima)
            ctx.lineWidth = 6; 
            ctx.lineCap = "round"; 
            ctx.lineJoin = "round"; 
            ctx.strokeStyle = "#5D1828";
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { 
                x: clientX - rect.left, 
                y: clientY - rect.top 
            };
        }

        function startPosition(e) { 
            isDrawing = true; 
            const pos = getPos(e); 
            lastX = pos.x; 
            lastY = pos.y; 
        }
        
        function endPosition() { 
            isDrawing = false; 
            ctx.beginPath(); 
        }
        
        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // EMPÊCHE LE SCROLL TACTILE SUR MOBILE
            const pos = getPos(e);
            ctx.beginPath(); 
            ctx.moveTo(lastX, lastY); 
            ctx.lineTo(pos.x, pos.y); 
            ctx.stroke();
            lastX = pos.x; 
            lastY = pos.y;
        }

        function clearSlate() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
        }

        // Événements Souris (Ordinateur)
        canvas.addEventListener("mousedown", startPosition); 
        canvas.addEventListener("mouseup", endPosition);
        canvas.addEventListener("mousemove", draw); 
        canvas.addEventListener("mouseout", endPosition);
        
        // Événements Tactiles (Tablette / Téléphone)
        canvas.addEventListener("touchstart", startPosition, { passive: false }); 
        canvas.addEventListener("touchend", endPosition);
        canvas.addEventListener("touchmove", draw, { passive: false });
        
        // Redimensionnement de la fenêtre
        window.addEventListener("resize", resizeCanvas);

        // Lancement au démarrage
        window.onload = () => {
            // Petit délai pour s'assurer que le CSS a bien pris sa place avant de mesurer le canvas
            setTimeout(resizeCanvas, 100);
        };
    </script>
</body>
</html>
