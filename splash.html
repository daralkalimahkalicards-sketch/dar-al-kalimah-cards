<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5D1828">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Dar Al-Kalimah</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #logo {
    max-width: 280px;
    width: 70%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease;
  }
</style>
</head>
<body>
  <img id="logo" src="logo-site-web_vertical .jpg" alt="Dar Al-Kalimah">
  <script>
    // Apparition en fondu doux
    setTimeout(() => {
      document.getElementById('logo').style.opacity = '1';
    }, 200);

    // Redirection douce après 3 secondes de visibilité
    setTimeout(() => {
      document.getElementById('logo').style.transition = 'opacity 0.8s ease';
      document.getElementById('logo').style.opacity = '0';
      setTimeout(() => { window.location.replace('auth.html'); }, 800);
    }, 3200);
  </script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch((err) => console.error('SW registration failed:', err));
  let dakSwRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (dakSwRefreshing) return;
    dakSwRefreshing = true;
    window.location.reload();
  });
}
</script>
</body>
</html>
