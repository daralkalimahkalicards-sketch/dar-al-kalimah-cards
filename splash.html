<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5D1828">
<link rel="manifest" href="/dar-al-kalimah-cards/manifest.json">
<title>Dar Al-Kalimah</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .logo {
    position: absolute;
    width: 200px;
    height: 200px;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #logo-rond {
    border-radius: 50%;
  }
  #logo-vertical {
    width: auto;
    height: 260px;
  }
</style>
</head>
<body>
  <img id="logo-rond" class="logo" src="logo-rond.jpg" alt="Dar Al-Kalimah">
  <img id="logo-vertical" class="logo" src="logo-site-web_vertical .jpg" alt="Dar Al-Kalimah">

  <script>
    const rond = document.getElementById('logo-rond');
    const vertical = document.getElementById('logo-vertical');

    // Étape 1 : logo rond en fondu (0 → 1s)
    setTimeout(() => { rond.style.opacity = '1'; }, 100);

    // Étape 2 : fondu croisé vers logo vertical (à 1s)
    setTimeout(() => {
      rond.style.opacity = '0';
      vertical.style.opacity = '1';
    }, 1100);

    // Redirection vers auth.html (après 1s + 1.5s + 0.6s fondu)
    setTimeout(() => {
      window.location.replace('auth.html');
    }, 3200);
  </script>
</body>
</html>
