<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Génération icônes PWA</title>
<style>body{font-family:sans-serif;padding:30px;background:#f5f5f5;} h2{color:#5D1828;} .btn{background:#5D1828;color:#C8A462;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:1rem;margin:8px;}</style>
</head>
<body>
<h2>Générateur d'icônes PWA — Dar Al-Kalimah</h2>
<p>Clique sur les boutons pour télécharger les icônes PNG :</p>
<button class="btn" onclick="generate(192)">Télécharger icon-192.png</button>
<button class="btn" onclick="generate(512)">Télécharger icon-512.png</button>
<canvas id="c" style="display:none"></canvas>
<script>
function generate(size) {
  const canvas = document.getElementById('c');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx = size/2, cy = size/2, r = size/2;

  // Fond bordeaux circulaire
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#5D1828'; ctx.fill();

  // Bordure or extérieure
  ctx.beginPath(); ctx.arc(cx, cy, r*0.92, 0, Math.PI*2);
  ctx.strokeStyle = '#C8A462'; ctx.lineWidth = size*0.016; ctx.stroke();

  // Bordure or intérieure pointillée
  ctx.beginPath(); ctx.arc(cx, cy, r*0.86, 0, Math.PI*2);
  ctx.strokeStyle = '#C8A462'; ctx.lineWidth = size*0.004;
  ctx.setLineDash([size*0.02, size*0.01]); ctx.stroke();
  ctx.setLineDash([]);

  // Livre ouvert
  const s = size/512;
  ctx.save(); ctx.translate(cx, cy + size*0.08);
  ctx.strokeStyle = '#C8A462'; ctx.lineWidth = size*0.012; ctx.lineCap = 'round';
  // Côtés livre
  ctx.beginPath(); ctx.moveTo(-110*s, 20*s); ctx.lineTo(0, -10*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(110*s, 20*s); ctx.lineTo(0, -10*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-110*s, 30*s); ctx.lineTo(-110*s, 20*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(110*s, 30*s); ctx.lineTo(110*s, 20*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-110*s, 30*s); ctx.lineTo(0, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(110*s, 30*s); ctx.lineTo(0, 0); ctx.stroke();
  // Pages
  ctx.lineWidth = size*0.008;
  [-90,-70].forEach(x => { ctx.beginPath(); ctx.moveTo(x*s, 15*s); ctx.lineTo(-5*s, -7*s); ctx.stroke(); });
  [90,70].forEach(x => { ctx.beginPath(); ctx.moveTo(x*s, 15*s); ctx.lineTo(5*s, -7*s); ctx.stroke(); });
  ctx.restore();

  // Plume
  ctx.save(); ctx.translate(cx, cy - size*0.06);
  ctx.rotate(-15 * Math.PI/180);
  ctx.beginPath(); ctx.ellipse(0, 0, 22*s, 70*s, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(200,164,98,0.9)'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, 0, 10*s, 60*s, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(93,24,40,0.5)'; ctx.fill();
  ctx.restore();

  // Texte دار الكلمة
  ctx.fillStyle = '#C8A462';
  ctx.font = `bold ${size*0.1}px serif`;
  ctx.textAlign = 'center';
  ctx.fillText('دار الكلمة', cx, cy + size*0.36);

  // Texte DAR AL-KALIMAH
  ctx.font = `bold ${size*0.065}px serif`;
  ctx.letterSpacing = '2px';
  ctx.fillText('DAR AL-KALIMAH', cx, cy - size*0.28);

  // Téléchargement
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
