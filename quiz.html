 
<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalicards - Quiz Grand Plateau</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* =========================================
           VARIABLES & GLOBALS
           ========================================= */
        :root {
            --burgundy: #5D1828;
            --burgundy-dark: #3a0f19;
            --gold: #C8A462;
            --gold-light: #dfc28b;
            --white: #FFFFFF;
            --bg-beige: #FAF6F0;
            --success-green: #e8f5e9;
            --success-border: #4CAF50;
            --error-red: #ffebee;
            --error-border: #f44336;
            --shadow-soft: 0 15px 35px rgba(93, 24, 40, 0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-beige);
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg-beige) 80%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', system-ui, sans-serif;
            padding: 10px;
            overflow-x: hidden;
            color: var(--burgundy);
        }

        .ar-text { font-family: "Amiri", serif; line-height: 1.2; direction: rtl; }
        .serif-text { font-family: "Cinzel", "Georgia", serif; }

        .view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: floatIn 0.5s ease-out forwards;
        }

        .hidden { display: none !important; }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           BOUTONS & CONTENEURS
           ========================================= */
        .menu-container, .board-container {
            text-align: center;
            background: linear-gradient(145deg, var(--white), #fdfdfd);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid var(--gold);
            box-shadow: inset 0 0 0 5px var(--white), inset 0 0 0 6px var(--gold-light), var(--shadow-soft);
            width: 100%;
            max-width: 750px;
        }

        .divider {
            width: 60px; height: 2px;
            background-color: var(--gold);
            margin: 20px auto; border-radius: 2px;
        }

        .btn-main, .btn-secondary {
            background: linear-gradient(135deg, var(--burgundy), var(--burgundy-dark));
            color: var(--white); border: 2px solid var(--burgundy);
            padding: 15px 40px; font-size: 1.05rem; border-radius: 50px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: 'Montserrat', sans-serif; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(93, 24, 40, 0.25); display: inline-block;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(93, 24, 40, 0.35); border-color: var(--gold); }
        .btn-main:active { transform: translateY(1px); }

        .btn-secondary { background: var(--bg-beige); color: var(--burgundy); border-color: var(--gold); box-shadow: 0 4px 15px rgba(200, 164, 98, 0.2); }
        .btn-secondary:hover { background: var(--gold); color: var(--white); }

        /* =========================================
           ACCUEIL
           ========================================= */
        .brand-ar { font-size: 3.5rem; font-weight: bold; color: var(--burgundy); margin-bottom: 5px; }
        .app-title { font-size: 1.6rem; color: var(--gold); letter-spacing: 2px; }
        .subtitle-group { margin-bottom: 30px; }
        .subtitle { font-size: 1.05rem; font-weight: 500; margin-bottom: 5px; }
        .subtitle.es { font-size: 0.95rem; opacity: 0.8; }

        .input-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; width: 100%; }
        .input-group label { font-size: 0.9rem; font-weight: 600; color: var(--burgundy); margin-bottom: 10px; opacity: 0.9; }
        .input-group input {
            width: 100%; max-width: 350px; padding: 15px; font-size: 1.1rem;
            font-family: 'Montserrat', sans-serif; text-align: center;
            border: 2px solid var(--gold-light); border-radius: 12px;
            background-color: var(--bg-beige); color: var(--burgundy); outline: none;
            transition: all 0.3s ease;
        }
        .input-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(200, 164, 98, 0.2); background-color: var(--white); }

        /* =========================================
           PLATEAU DE JEU (GRAND QUIZ)
           ========================================= */
        .quiz-header {
            width: 100%; max-width: 750px; margin-bottom: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .progress-container { width: 100%; max-width: 400px; margin-bottom: 15px; }
        .progress-info { text-align: center; margin-bottom: 8px; }
        .progress-text { font-weight: 700; color: var(--burgundy); font-size: 1rem; letter-spacing: 1px; }
        .progress-bar-container { width: 100%; height: 8px; background-color: var(--white); border: 1px solid var(--gold-light); border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background-color: var(--gold); width: 0%; transition: width 0.4s ease; }

        .audio-section {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            margin-bottom: 20px;
        }

        .instruction-text { font-weight: 600; font-size: 1.1rem; text-align: left; line-height: 1.3; }
        .instruction-text small { opacity: 0.8; font-weight: 500; font-size: 0.85rem; display: block; }

        .btn-audio.big-audio {
            width: 65px; height: 65px; font-size: 2rem;
            background: linear-gradient(135deg, var(--bg-beige), #fff); border: 3px solid var(--gold);
            color: var(--burgundy); border-radius: 50%; cursor: pointer;
            box-shadow: 0 8px 25px rgba(200, 164, 98, 0.3); transition: all 0.3s ease;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .btn-audio.big-audio:hover { transform: scale(1.1); background: var(--gold); }
        .btn-audio.big-audio:active { transform: scale(0.95); }

        /* Grille de 28 lettres avec écriture de droite à gauche ! */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            direction: rtl; /* L'arabe s'écrit de droite à gauche */
        }

        .board-card {
            background: var(--white); border: 2px solid var(--gold-light); border-radius: 12px;
            aspect-ratio: 1; display: flex; justify-content: center; align-items: center;
            font-size: 2.4rem; color: var(--burgundy); cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.2s ease;
            user-select: none;
        }
        .board-card:hover { transform: translateY(-2px); border-color: var(--gold); box-shadow: 0 6px 15px rgba(200, 164, 98, 0.2); }
        .board-card:active { transform: scale(0.92); }

        .board-card.correct { border: 3px solid var(--success-border) !important; background-color: var(--success-green); color: var(--success-border); z-index: 2; transform: scale(1.05); box-shadow: 0 0 15px rgba(76, 175, 80, 0.4); }
        .board-card.wrong { border: 3px solid var(--error-border) !important; background-color: var(--error-red); animation: gentleShake 0.4s; opacity: 0.6; }

        @keyframes gentleShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

        /* =========================================
           CERTIFICAT
           ========================================= */
        .diploma-paper {
            background: linear-gradient(145deg, #ffffff, #fcfcfc); border: 8px double var(--gold);
            padding: 40px; border-radius: 16px; text-align: center; max-width: 500px; width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; margin-bottom: 30px;
        }
        .cert-ar { font-size: 4.5rem; color: var(--gold); line-height: 1; margin-bottom: 10px; }
        .cert-title { color: var(--burgundy); font-size: 2rem; margin-bottom: 20px; }
        .cert-messages { margin-bottom: 25px; }
        .cert-msg { font-weight: 600; color: #444; }
        .cert-msg.es { font-size: 0.9rem; color: #777; margin-top: 5px; }
        
        .cert-name { 
            font-size: 2.8rem; color: var(--burgundy); border-bottom: 1px solid var(--gold-light); 
            padding-bottom: 10px; margin-bottom: 25px; word-break: break-word; 
        }
        
        .cert-score-box { background-color: var(--bg-beige); border: 2px solid var(--gold); border-radius: 12px; padding: 15px; display: inline-block; margin-bottom: 20px; }
        .score-label { display: block; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; color: var(--gold); margin-bottom: 5px; }
        .score-value { font-size: 1.8rem; font-weight: bold; color: var(--burgundy); }
        .cert-date { font-size: 0.95rem; color: #888; font-weight: 500; }
        .cert-icon { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 2.5rem; background: var(--bg-beige); border-radius: 50%; padding: 5px; }
        .cert-actions { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        /* =========================================
           TOAST NOTIFICATION
           ========================================= */
        .toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background-color: rgba(93, 24, 40, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--white); padding: 16px 35px; border-radius: 50px; font-size: 0.95rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25); transition: bottom 0.5s ease;
            z-index: 1000; text-align: center; border: 1px solid rgba(200, 164, 98, 0.3); font-weight: 500;
        }
        .toast.show { bottom: 40px; }
