<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dar Al-Kalimah Card</title>
<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
font-family:Arial;
}

.card{
width:700px;
height:420px;
background:white;
border-radius:20px;
border:2px solid #C8A462;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.letter{
font-size:200px;
color:#5D1828;
}

</style>
</head>

<body>

<div class="card">

<div class="letter" id="letter">
ب
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const letter = params.get("letter");

if(letter){
document.getElementById("letter").innerText = letter;
}

</script>

</body>
</html>
