            playerName = document.getElementById('player-name').value.trim() || "Participant";
            score = 0;
            currentQuestionIndex = 0;
            isAnswerProcessing = false;

            document.querySelector('.btn-back-home').style.display = 'none'; 
            document.getElementById('view-welcome').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');

            loadQuestion();
        }

        function generateQuestions() {
            questions = [];
            let shuffledAlphabet = [...alphabetData].sort(() => Math.random() - 0.5);

            // Création d'un pool parfait de 28 Harakat : 7 de chaque
            let harakatPool = [];
            for (let i = 0; i < 7; i++) {
                harakatPool.push("fathah", "dammah", "kasrah", "soukoun");
            }
            // Mélange du pool
            harakatPool = harakatPool.sort(() => Math.random() - 0.5);

            shuffledAlphabet.forEach((letterObj, index) => {
                // On attribue une Harakah équilibrée à chaque lettre
                const targetKey = harakatPool[index];
                const targetHarakah = letterObj[targetKey];

                let options = [
                    letterObj.fathah.form,
                    letterObj.dammah.form,
                    letterObj.kasrah.form,
                    letterObj.soukoun.form
                ].sort(() => Math.random() - 0.5); 
                
                questions.push({
                    targetArabic: targetHarakah.form,
                    targetAudio: targetHarakah.audio,
                    options: options
                });
            });
        }

        function loadQuestion() {
            isAnswerProcessing = false;
            const currentQ = questions[currentQuestionIndex];
            
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('progress-fill').style.width = `${(currentQuestionIndex / questions.length) * 100}%`;

            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = "";

            currentQ.options.forEach(arabicWord => {
                const btn = document.createElement('div');
                btn.className = 'option-card ar-text';
                btn.innerText = arabicWord;
                btn.onclick = () => handleAnswer(arabicWord, btn, currentQ.targetArabic);
                optionsGrid.appendChild(btn);
            });

            setTimeout(() => { playCurrentQuestionAudio(); }, 400);
        }

        function handleAnswer(selectedArabic, cardElement, targetArabic) {
            if (isAnswerProcessing) return;
            isAnswerProcessing = true;
            
            const allCards = document.getElementById('options-grid').children;

            if (selectedArabic === targetArabic) {
                score++;
                cardElement.classList.add('correct');
            } else {
                cardElement.classList.add('wrong');
                for (let i = 0; i < allCards.length; i++) {
                    if (allCards[i].innerText === targetArabic) {
                        allCards[i].classList.add('correct');
                    }
                }
            }

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < questions.length) { loadQuestion(); } 
                else { finishQuiz(); }
            }, 1000);
        }

        function playCurrentQuestionAudio() {
            const currentQ = questions[currentQuestionIndex];
            if (currentQ.targetAudio) {
                currentAudio.src = currentQ.targetAudio;
                currentAudio.play().catch(e => console.log(e));
            }
        }

        function finishQuiz() {
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-certificate').classList.remove('hidden');
            document.querySelector('.btn-back-home').style.display = 'flex';
            document.getElementById('progress-fill').style.width = `100%`;
            document.getElementById('cert-name').innerText = playerName;
            document.getElementById('cert-score').innerText = `${score} / ${questions.length}`;
            
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const dateStr = new Date().toLocaleDateString('fr-FR', options);
            document.getElementById('cert-date').innerText = `Fait le ${dateStr}`;

            triggerConfetti();

            // AUDIO MABROUK (Simple et direct)
            const mabrukAudio = new Audio("audio/mabruk.mp3");
            mabrukAudio.play().catch(e => console.log(e));
        }

        function triggerConfetti() {
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#C8A462', '#5D1828'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#C8A462', '#5D1828'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function restartQuiz() {
            document.getElementById('view-certificate').classList.add('hidden');
            document.getElementById('view-welcome').classList.remove('hidden');
            document.getElementById('player-name').value = ""; 
        }
    </script>
</body>
</html>
