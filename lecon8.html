<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Dar Al-Kalimah – Leçon 8 | الاسم وحروف الجر</title>
  <meta name="theme-color" content="#FAF6F0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{
      --burgundy:#5D1828;--burgundy-dark:#3a0f19;
      --gold:#C8A462;--gold-light:#dfc28b;
      --white:#FFFFFF;--bg-beige:#FAF6F0;
      --text-dark:#2C3E50;--text-soft:#8c775a;
      --shadow-soft:0 8px 25px rgba(93,24,40,0.06);
      --shadow-card:0 20px 50px rgba(93,24,40,0.10);
      --transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1);
      --radius-xl:28px;--radius-lg:22px;--radius-md:18px;--radius-sm:12px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
    body{min-height:100vh;min-height:100dvh;background:var(--bg-beige);font-family:"Montserrat",sans-serif;color:var(--text-dark);padding:16px 14px 50px;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(circle at 12% 18%,rgba(200,164,98,0.13),transparent 26%),radial-gradient(circle at 88% 12%,rgba(93,24,40,0.08),transparent 28%),radial-gradient(circle at 50% 92%,rgba(200,164,98,0.10),transparent 34%);}
    button,a{touch-action:manipulation;font:inherit;text-decoration:none;border:none;background:none;cursor:pointer;outline:none;}
    .ar{font-family:"Amiri",serif;direction:rtl;unicode-bidi:isolate;text-rendering:optimizeLegibility;font-feature-settings:"liga" 1,"calt" 1,"mark" 1,"mkmk" 1;line-height:1.7;}
    .serif{font-family:"Cinzel","Georgia",serif;}
    .hidden{display:none!important;}
    .view{width:100%;max-width:640px;display:flex;flex-direction:column;align-items:center;animation:up .38s ease-out;}
    @keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .gold{color:var(--gold);font-weight:700;}

    /* ── HEADER SÉLECTION ── */
    .menu-header{text-align:center;margin-bottom:28px;position:relative;width:100%;padding-top:8px;}
    .menu-brand-ar{font-size:3.8rem;color:var(--gold);margin-bottom:2px;line-height:1;}
    .menu-brand-sub{font-size:0.72rem;letter-spacing:5px;text-transform:uppercase;color:var(--burgundy);opacity:0.65;margin-bottom:12px;font-family:"Cinzel",serif;}
    .menu-title{font-size:1rem;color:var(--burgundy);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:2px;}
    .menu-title-sub{font-size:0.82rem;color:var(--burgundy);font-weight:600;margin-bottom:6px;}
    .menu-title-es{font-size:0.8rem;color:#999;letter-spacing:1.5px;text-transform:uppercase;}
    .menu-title-es-sub{font-size:0.72rem;color:#bbb;font-style:italic;}
    .btn-house-menu{position:absolute;top:8px;right:0;color:var(--gold);font-size:1.8rem;transition:var(--transition);}
    .btn-house-menu:hover{transform:scale(1.1);}

    /* ── CARTES THÈME ── */
    .theme-list{width:100%;display:flex;flex-direction:column;gap:22px;}
    .theme-card{background:var(--white);border:1px solid rgba(200,164,98,0.22);border-radius:var(--radius-xl);padding:36px 24px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;align-items:center;transition:var(--transition);width:100%;cursor:pointer;}
    .theme-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 16px 40px rgba(93,24,40,0.13);}
    .theme-card:active{transform:scale(0.98);}
    .theme-card.ism-card{border-top:4px solid var(--burgundy);}
    .theme-card.huruf-card{border-top:4px solid var(--gold);}
    .theme-card.qiraa-card{border-top:4px solid var(--text-soft);}
    .theme-icon{font-size:3.5rem;color:var(--gold);margin-bottom:16px;}
    .theme-title-ar{font-size:2.4rem;color:var(--burgundy);font-weight:700;margin-bottom:14px;line-height:1.4;}
    .theme-divider{width:70px;height:2px;background:var(--gold);margin-bottom:12px;opacity:0.5;border-radius:2px;}
    .theme-title-fr{font-weight:700;font-size:1.1rem;color:var(--burgundy);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
    .theme-title-es{font-size:0.92rem;color:#888;font-style:italic;}

    /* ── BARRE DU HAUT ── */
    .lesson-top-bar{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;max-width:640px;}
    .pill-counter{background:var(--burgundy);color:var(--white);padding:8px 22px;border-radius:999px;font-weight:700;font-size:1.1rem;letter-spacing:1px;}
    .btn-house-lesson{color:var(--gold);font-size:1.8rem;transition:var(--transition);}
    .btn-back-lesson{color:var(--burgundy);font-size:1.5rem;transition:var(--transition);}

    /* ── FLIP CARD — AGRANDIE ── */
    .card-scene{width:100%;max-width:640px;perspective:1800px;margin-bottom:20px;}
    .card-flip{
      position:relative;
      width:100%;
      transform-style:preserve-3d;
      transition:transform 0.7s cubic-bezier(0.4,0.2,0.2,1);
      cursor:pointer;
      height:420px; /* sera ajusté dynamiquement par JS */
    }
    .card-flip.flipped{transform:rotateY(180deg);}

    /* Règle critique skill : position:absolute + top:0 + left:0 + height:100% */
    .card-face{
      position:absolute;
      top:0;left:0;
      width:100%;height:100%;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      background:var(--white);
      border-radius:var(--radius-xl);
      border:1px solid rgba(200,164,98,0.35);
      box-shadow:var(--shadow-card);
      padding:24px 20px 16px;
      display:flex;flex-direction:column;
      overflow-y:auto;
      /* Scrollbar discrète si besoin */
      scrollbar-width:thin;
      scrollbar-color:rgba(200,164,98,0.3) transparent;
    }
    .card-face::-webkit-scrollbar{width:4px;}
    .card-face::-webkit-scrollbar-thumb{background:rgba(200,164,98,0.3);border-radius:2px;}
    .card-back-face{transform:rotateY(180deg);}

    /* Branding dans la carte */
    .card-brand{text-align:center;margin-bottom:10px;}
    .card-brand-ar{font-size:1.8rem;color:var(--gold);line-height:1;margin-bottom:2px;}
    .card-brand-fr{font-size:0.62rem;color:var(--burgundy);letter-spacing:3px;text-transform:uppercase;opacity:0.65;}
    .card-sep{width:40px;height:1px;background:var(--gold);opacity:0.4;margin:14px auto;}

    /* Contenu recto */
    .card-title-ar{font-size:clamp(1.8rem,5.5vw,2.6rem);color:var(--burgundy);font-weight:700;text-align:center;margin-bottom:4px;line-height:1.4;}
    .card-title-fr{font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:2px;}
    .card-title-es{font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--burgundy);opacity:0.55;font-style:italic;text-align:center;margin-bottom:10px;}
    .card-rule-ar{font-family:"Amiri",serif;direction:rtl;font-size:clamp(1.2rem,3.8vw,1.7rem);color:var(--burgundy);line-height:1.8;text-align:center;margin-bottom:12px;}
    .card-rule-fr{font-size:0.88rem;color:var(--text-dark);line-height:1.65;margin-bottom:5px;}
    .card-rule-es{font-size:0.8rem;color:var(--text-soft);font-style:italic;line-height:1.6;}
    .flip-hint{text-align:center;color:var(--gold);font-size:0.7rem;letter-spacing:1px;opacity:0.55;margin-top:14px;padding-top:8px;border-top:1px solid rgba(200,164,98,0.15);font-family:"Cinzel",serif;animation:pulse 2.5s infinite;flex-shrink:0;}
    @keyframes pulse{0%,100%{opacity:0.35;}50%{opacity:0.8;}}

    /* Template signes */
    .signs-row{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin:10px 0;}
    .sign-item{display:flex;flex-direction:column;align-items:center;gap:6px;}
    .sign-ar{font-family:"Amiri",serif;font-size:2.8rem;color:var(--gold);line-height:1;}
    .sign-label{font-size:0.66rem;color:var(--burgundy);font-weight:600;text-align:center;max-width:70px;}

    /* حروف الجر overview */
    .huruf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:8px 0;}
    .harf-pill{background:var(--bg-beige);border:1px solid rgba(200,164,98,0.35);border-radius:14px;padding:10px 6px;text-align:center;}
    .harf-ar{font-family:"Amiri",serif;direction:rtl;font-size:2rem;color:var(--burgundy);font-weight:700;line-height:1.2;display:block;}
    .harf-fr{font-size:0.68rem;color:var(--text-soft);font-style:italic;display:block;margin-top:2px;}

    /* harf individuel hero */
    .harf-hero{text-align:center;margin:14px 0 28px;}
    .harf-hero-ar{font-family:"Amiri",serif;direction:rtl;font-size:4.5rem;color:var(--burgundy);font-weight:700;line-height:1;}
    .harf-hero-fr{font-size:0.85rem;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:10px;display:block;text-align:center;}
    .harf-hero-es{font-size:0.75rem;color:var(--burgundy);opacity:0.55;font-style:italic;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:4px;text-align:center;margin-bottom:0;}

    /* Exemples verso */
    .example-block{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 0;border-bottom:1px solid rgba(200,164,98,0.18);text-align:center;}
    .example-block:last-child{border-bottom:none;padding-bottom:0;}
    .example-block:first-child{padding-top:0;}
    .ex-ar{font-family:"Amiri",serif;direction:rtl;font-size:clamp(1.8rem,6.5vw,2.8rem);color:var(--burgundy);font-weight:700;line-height:1.4;}
    .ex-fr{font-size:0.9rem;color:var(--text-dark);font-weight:500;}
    .ex-es{font-size:0.8rem;color:var(--text-soft);font-style:italic;}

    /* ── QUIZ OUI / NON ── */
    .quiz-num{font-size:0.7rem;color:var(--gold);font-family:"Cinzel",serif;letter-spacing:2px;text-align:center;margin-bottom:8px;opacity:0.7;}
    .quiz-q-ar{font-family:"Amiri",serif;direction:rtl;font-size:clamp(1.4rem,4.5vw,1.9rem);color:var(--burgundy);font-weight:700;line-height:1.8;text-align:center;margin:10px 0 6px;}
    .quiz-q-fr{font-size:0.92rem;color:var(--text-dark);text-align:center;margin-bottom:4px;}
    .quiz-q-es{font-size:0.82rem;color:var(--text-soft);font-style:italic;text-align:center;margin-bottom:20px;}
    .quiz-btns{display:flex;gap:14px;justify-content:center;margin:0 0 16px;}
    .quiz-btn{flex:1;max-width:140px;padding:14px 10px;border-radius:999px;font-weight:700;font-size:1rem;letter-spacing:1px;border:2px solid;cursor:pointer;transition:all 0.25s;font-family:"Montserrat",sans-serif;}
    .quiz-btn-oui{background:rgba(93,24,40,0.06);border-color:var(--burgundy);color:var(--burgundy);}
    .quiz-btn-non{background:rgba(200,164,98,0.08);border-color:var(--gold);color:#8a6620;}
    .quiz-btn:disabled{opacity:0.4;pointer-events:none;}
    .quiz-feedback{border-radius:16px;padding:14px 16px;margin-top:4px;font-size:0.88rem;line-height:1.6;text-align:center;display:none;}
    .quiz-feedback.correct{background:rgba(34,139,34,0.08);border:1px solid rgba(34,139,34,0.25);color:#1a6b1a;}
    .quiz-feedback.wrong{background:rgba(200,30,30,0.07);border:1px solid rgba(200,30,30,0.2);color:#9b1a1a;}
    .quiz-feedback.show{display:block;}

    /* Légende couleurs */
    .qiraa-legend{
      display:flex;justify-content:center;gap:20px;flex-wrap:wrap;
      margin:0 0 10px;
      padding:8px 14px;
      background:rgba(200,164,98,0.08);
      border:1px solid rgba(200,164,98,0.2);
      border-radius:10px;
      font-size:0.72rem;
    }
    .legend-item{display:flex;align-items:center;gap:5px;font-family:"Cinzel",serif;font-size:0.64rem;letter-spacing:0.5px;}
    .legend-dot-harf{width:10px;height:10px;background:var(--gold);border-radius:50%;flex-shrink:0;}
    .legend-dot-ism{width:10px;height:10px;background:var(--burgundy);border-radius:50%;flex-shrink:0;border:2px solid var(--burgundy);}

    .qiraa-title-fr{font-size:0.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:10px;font-family:"Cinzel",serif;}

    /* Texte arabe de lecture */
    .qiraa-text{
      font-family:"Amiri",serif;direction:rtl;
      font-size:clamp(1.4rem,4.5vw,1.9rem);
      color:var(--text-dark);
      line-height:2.3;text-align:center;
      width:100%;margin:6px 0;
    }

    /* حرف الجر → or */
    .hl-harf{color:var(--gold);font-weight:700;}

    /* اسم → bordeaux gras + légèrement souligné */
    .hl-ism{
      color:var(--burgundy);
      font-weight:700;
      text-decoration:underline;
      text-decoration-color:rgba(93,24,40,0.35);
      text-underline-offset:4px;
    }

    /* Section analyse (verso qiraa) */
    .analyse-block{
      display:flex;flex-direction:column;gap:10px;
      padding:0 4px;
    }
    .analyse-row{
      display:flex;align-items:flex-start;gap:10px;
      padding:10px 12px;
      background:var(--bg-beige);
      border-radius:12px;
      border:1px solid rgba(200,164,98,0.18);
    }
    .analyse-ar{
      font-family:"Amiri",serif;direction:rtl;
      font-size:1.5rem;color:var(--burgundy);font-weight:700;
      min-width:80px;text-align:right;flex-shrink:0;
      line-height:1.3;
    }
    .analyse-fr{font-size:0.82rem;color:var(--text-dark);line-height:1.55;padding-top:2px;}
    .analyse-label{
      font-size:0.65rem;font-family:"Cinzel",serif;letter-spacing:1px;
      padding:2px 7px;border-radius:999px;white-space:nowrap;
      flex-shrink:0;margin-top:4px;
    }
    .label-harf{background:rgba(200,164,98,0.18);color:#8a6620;}
    .label-ism{background:rgba(93,24,40,0.10);color:var(--burgundy);}

    /* ── NAVIGATION ── */
    .nav-controls{display:flex;justify-content:space-between;gap:14px;width:100%;max-width:640px;}
    .btn-nav{flex:1;padding:16px 14px;border-radius:999px;font-weight:700;font-size:0.92rem;text-transform:uppercase;letter-spacing:1.5px;transition:var(--transition);display:flex;justify-content:center;align-items:center;gap:10px;background:var(--white);border:1px solid rgba(200,164,98,0.45);color:var(--burgundy);box-shadow:var(--shadow-soft);min-height:50px;}
    .btn-nav:hover{background:var(--burgundy);color:var(--white);border-color:var(--burgundy);transform:translateY(-2px);}
    .btn-nav:disabled{opacity:0.35;pointer-events:none;}

    @media(max-width:480px){
      .card-flip{height:clamp(560px, 80dvh, 680px);}
      .card-face{padding:18px 14px 12px;}
      .card-brand-ar{font-size:1.5rem;}
      .btn-nav{font-size:0.8rem;padding:13px 8px;}
      .harf-hero-ar{font-size:3.8rem;}
      .analyse-ar{font-size:1.3rem;}
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     VUE 1 — SÉLECTION THÈME
════════════════════════════════════════ -->
<main id="view-select" class="view">
  <header class="menu-header">
    <a href="module8.html" class="btn-house-menu"><i class="fa-solid fa-house"></i></a>

    <div class="menu-brand-sub serif">DAR AL-KALIMAH</div>

<!-- ═══════════════════════════════════════
     VUE 2 — الاسم

</main>

<!-- ═══════════════════════════════════════
     VUE 4 — تعزيز القراءة

  <div class="lesson-top-bar">
    <div class="pill-counter"><span id="qiraa-curr">1</span> / 3</div>
    <button class="btn-back-lesson" onclick="goHome()"><i class="fa-solid fa-house"></i></button>

      <div class="card-face" id="qiraa-front"></div>

  </nav>
</main>

<script>
(() => {
"use strict";

// ════════════════════════════════════════════
// DONNÉES
// ════════════════════════════════════════════

const DATA = {

  ism: [
    {
      front: `
        <div class="card-brand">
          <div class="card-brand-ar ar">دار الكلمة</div>
          <div class="card-brand-fr serif">DAR AL-KALIMAH</div>

// ════════════════════════════════
// STATE
// ════════════════════════════════
const State = {
  ism:   { idx: 0, flipped: false },
  huruf: { idx: 0, flipped: false },
  qiraa: { idx: 0, flipped: false }
};

// ════════════════════════════════
// UTILS
// ════════════════════════════════
const $ = id => document.getElementById(id);
const views = {
  select: $("view-select"),
  ism:    $("view-ism"),
  huruf:  $("view-huruf"),
  qiraa:  $("view-qiraa")
};

function showView(name) {
  Object.values(views).forEach(v => v.classList.add("hidden"));
  views[name].classList.remove("hidden");
}

// ════════════════════════════════
// RENDU
// ════════════════════════════════
function adjustHeight(section) {
  requestAnimationFrame(() => {
    const frontEl = $(`${section}-front`);
    const backEl  = $(`${section}-back`);
    const h = Math.max(frontEl.scrollHeight, backEl.scrollHeight, 380);
    $("card-" + section).style.height = h + 32 + "px";
  });
}

function renderSection(section) {
  const s = State[section];
  const cards = DATA[section];
  const card = cards[s.idx];

  s.flipped = false;
  const flip = $("card-" + section);
  flip.classList.remove("flipped");

  if (card.type === 'quiz') {
    flip.onclick = null;
    flip.style.cursor = 'default';
    $(`${section}-front`).innerHTML = `
      <div class="card-brand" style="margin-bottom:10px;">
        <div class="card-brand-ar ar" style="font-size:2rem;">دار الكلمة</div>
        <div class="card-brand-fr serif" style="font-size:1rem;letter-spacing:3px;color:var(--burgundy);opacity:0.85;font-family:'Amiri',serif;direction:rtl;">تَعْزِيزُ الْقِرَاءَة</div>
      </div>
      <div class="card-sep"></div>
      <div class="quiz-num" style="margin:18px 0 18px;">QUESTION ${card.num} / 10 &nbsp;·&nbsp; PREGUNTA ${card.num} / 10</div>
      <div class="quiz-q-ar ar" style="margin:0 0 20px;font-size:clamp(1.5rem,5vw,2rem);">${card.ar}</div>
      <div class="quiz-q-fr" style="margin-bottom:8px;font-size:0.95rem;">${card.fr}</div>
      <div class="quiz-q-es" style="margin-bottom:32px;">${card.es}</div>
      <div class="quiz-btns" style="margin-bottom:24px;">
        <button class="quiz-btn quiz-btn-oui" onclick="answerQuiz('${section}',true)">
          نعم<br><small>Oui · Sí</small>
        </button>
        <button class="quiz-btn quiz-btn-non" onclick="answerQuiz('${section}',false)">
          لا<br><small>Non · No</small>
        </button>
      </div>
      <div class="quiz-feedback" id="qfb-${section}"></div>
    `;
    $(`${section}-back`).innerHTML = '';
  } else {
    // Carte texte normale avec flip
    flip.onclick = () => flipCard(section);
    flip.style.cursor = 'pointer';
    $(`${section}-front`).innerHTML = card.front;
    $(`${section}-back`).innerHTML = card.back;
  }

  $(`${section}-curr`).textContent = s.idx + 1;
  if ($(`${section}-tot`)) $(`${section}-tot`).textContent = cards.length;

  $(`${section}-prev`).disabled = s.idx === 0;
  $(`${section}-next`).disabled = s.idx === cards.length - 1;

  $(`${section}-front`).scrollTop = 0;
  $(`${section}-back`).scrollTop = 0;
}

window.answerQuiz = function(section, chosen) {
  const card = DATA[section][State[section].idx];
  const fb = $(`qfb-${section}`);
  const correct = chosen === card.answer;
  document.querySelectorAll(`#view-${section} .quiz-btn`).forEach(b => b.disabled = true);
  fb.className = 'quiz-feedback show ' + (correct ? 'correct' : 'wrong');
  const ar = correct ? card.ok_ar : card.ko_ar;
  const fr = correct ? card.ok_fr : card.ko_fr;
  const es = correct ? card.ok_es : card.ko_es;
  fb.innerHTML = `
    <div style="font-family:'Amiri',serif;font-size:1.1rem;direction:rtl;margin-bottom:6px;">${ar}</div>
    <div style="margin-bottom:4px;font-weight:600;">${fr}</div>
    <em>${es}</em>`;
};

// ════════════════════════════════
// ACTIONS
// ════════════════════════════════
window.openSection = function(section) {
  State[section].idx = 0;
  State[section].flipped = false;
  renderSection(section);
  showView(section);
  adjustHeight(section); // mesure APRÈS que la vue est visible
};

window.goHome = function() {
  showView("select");
};

window.flipCard = function(section) {
  const card = DATA[section][State[section].idx];
  if (card.type === 'quiz') return;
  State[section].flipped = !State[section].flipped;
  $("card-" + section).classList.toggle("flipped", State[section].flipped);
};

window.navigate = function(section, dir) {
  const s = State[section];
  const len = DATA[section].length;
  const next = s.idx + dir;
  if (next < 0 || next >= len) return;
  s.idx = next;
  renderSection(section);
  adjustHeight(section);
};

// Swipe
["ism","huruf","qiraa"].forEach(section => {
  let tx = 0;
  const el = $("view-" + section);
  el.addEventListener("touchstart", e => { tx = e.touches[0].clientX; }, {passive:true});
  el.addEventListener("touchend", e => {
    const dx = tx - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 55) {
      if (dx > 0) navigate(section, 1);
      else navigate(section, -1);
    }
  }, {passive:true});
});

})();
</script>
</body>
</html>
