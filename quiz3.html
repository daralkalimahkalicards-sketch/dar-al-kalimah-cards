<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalicards - Quiz 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --burgundy: #5D1828; --burgundy-dark: #3a0f19;
            --gold: #C8A462; --gold-light: #dfc28b;
            --white: #FFFFFF; --bg-beige: #FAF6F0;
            --success-green: #e8f5e9; --success-border: #4CAF50;
            --error-red: #ffebee; --error-border: #f44336;
            --shadow-soft: 0 15px 35px rgba(93, 24, 40, 0.08);
            --shadow-deep: 0 8px 25px rgba(93, 24, 40, 0.25);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-beige);
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg-beige) 80%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Montserrat', system-ui, sans-serif;
            padding: 15px; overflow-x: hidden; color: var(--burgundy);
        }
        .ar-text { font-family: "Amiri", serif; line-height: 1.2; direction: rtl; }
        .serif-text { font-family: "Cinzel", "Georgia", serif; }
        .gold { color: var(--gold) !important; }
        .burgundy { color: var(--burgundy) !important; }
        .view { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: floatIn 0.6s forwards; }
        .hidden { display: none !important; }
        @keyframes floatIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .menu-container { text-align: center; background: var(--burgundy); padding: 40px 30px; border-radius: 24px; box-shadow: var(--shadow-deep); width: 100%; max-width: 650px; }
        .menu-container .brand-ar { font-size: 3.8rem; font-weight: bold; color: var(--gold); }
        .menu-container .app-title { font-size: 1.6rem; color: #d09470; letter-spacing: 2px; text-transform: uppercase; }
        .menu-container .divider { width: 60px; height: 3px; background-color: var(--gold); margin: 20px auto; opacity: 0.5; }
        .menu-container .subtitle { font-size: 1.05rem; color: var(--white); margin-bottom: 5px; }
        .menu-container .subtitle.es { font-size: 0.95rem; color: var(--gold-light); font-style: italic; margin-bottom: 30px;}

        .input-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 35px; width: 100%; }
        .input-group label { font-size: 0.9rem; font-weight: 600; color: var(--gold); margin-bottom: 12px; }
        .input-group input { width: 100%; max-width: 380px; padding: 16px; font-size: 1.15rem; text-align: center; border: 2px solid var(--gold); border-radius: 12px; background-color: var(--white); outline: none; }

        .btn-main { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 16px 40px; font-size: 1.05rem; border-radius: 50px; cursor: pointer; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        .btn-main:hover { background: rgba(200, 164, 98, 0.1); transform: translateY(-3px); }

        .quiz-container { text-align: center; background: var(--white); padding: 40px 30px; border-radius: 24px; border: 1px solid var(--gold); box-shadow: var(--shadow-soft); width: 100%; max-width: 650px; }
        .progress-bar-container { width: 100%; height: 10px; background-color: var(--bg-beige); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background-color: var(--gold); width: 0%; transition: 0.5s; }
        .word-display-box { background: var(--bg-beige); border: 2px solid var(--gold-light); border-radius: 20px; padding: 30px; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .big-word { font-size: 6.5rem; font-weight: bold; direction: rtl; unicode-bidi: isolate; }
        .btn-audio { width: 55px; height: 55px; font-size: 1.5rem; background: var(--white); border: 2px solid var(--gold); color: var(--burgundy); border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; }
        .option-card { background: var(--white); border: 2px solid var(--gold-light); border-radius: 16px; aspect-ratio: 1.5; display: flex; justify-content: center; align-items: center; font-size: 4rem; cursor: pointer; transition: 0.25s; }
        .option-card.correct { border-color: var(--success-border); background: var(--success-green); color: var(--success-border); }
        .option-card.wrong { border-color: var(--error-border); background: var(--error-red); pointer-events: none; opacity: 0.7;}

        .diploma-paper { background: white; border: 8px double var(--gold); padding: 40px; border-radius: 20px; text-align: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .cert-name { font-size: 3rem; color: var(--burgundy); border-bottom: 2px solid var(--gold-light); margin: 20px 0; word-break: break-word;}
        
        .toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background-color: rgba(93, 24, 40, 0.95); backdrop-filter: blur(10px);
            color: var(--white); padding: 16px 35px; border-radius: 50px; font-size: 0.95rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25); transition: bottom 0.5s ease;
            z-index: 1000; text-align: center; border: 1px solid rgba(200, 164, 98, 0.3); font-weight: 500;
        }
        .toast.show { bottom: 40px; }
        
        @media (max-width: 480px) {
            .big-word { font-size: 4.5rem; }
            .option-card { font-size: 3rem; aspect-ratio: 1.2; }
            .cert-name { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div id="view-welcome" class="view">
        <div class="menu-container">
            <div class="brand-ar ar-text">اختبار الكلمات</div>
            <div class="app-title serif-text">Dar Al-Kalima - Quiz 3</div>
            <div class="divider"></div>
            <p class="subtitle">Trouve la lettre dorée dans le mot.</p>
            <p class="subtitle es">Encuentra la letra dorada en la palabra.</p>
            <div class="input-group">
                <label>NOM DU PARTICIPANT</label>
                <input type="text" id="player-name" placeholder="Ton nom..." autocomplete="off">
            </div>
            <button class="btn-main" onclick="startQuiz()">Commencer</button>
        </div>
    </div>

    <div id="view-quiz" class="view hidden">
        <div class="quiz-container">
            <div class="progress-bar-container"><div id="progress-fill" class="progress-bar-fill"></div></div>
            <div class="word-display-box">
                <div class="big-word ar-text" id="quiz-word"></div>
                <button class="btn-audio" onclick="playWordAudio()">🎙️</button>
            </div>
            <div class="options-grid" id="options-grid" dir="rtl"></div>
        </div>
    </div>

    <div id="view-certificate" class="view hidden">
        <div class="diploma-paper">
            <div class="ar-text" style="font-size: 4rem; color: var(--gold);">مبروك</div>
            <h2 class="serif-text" style="color: var(--burgundy);">CERTIFICAT DE RÉUSSITE</h2>
            <div id="cert-name" class="cert-name">Participant</div>
            <div style="font-size: 1.5rem; font-weight: bold; color: var(--burgundy);" id="cert-score">0 / 28</div>
            <button class="btn-main" style="margin-top: 30px; border-color: var(--burgundy); color: var(--burgundy);" onclick="location.reload()">Recommencer ↺</button>
        </div>
    </div>
    
    <div id="toast" class="toast">
        Audio non disponible pour le moment.
    </div>

    <script>
        const alphabetOnly = ["أ","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","ه","و","ي"];
        
        // MATRICE UNIVERSELLE APPLIQUÉE AU QUIZ 3
        const wordsData = [
            { letter: "أ", audio: "audio/01-alif.mp3", words: ['<span class="gold">أَ</span>سَد','كَ<span class="gold">أْ</span>س','مَلْجَ<span class="gold">أ</span>']},
            { letter: "ب", audio: "audio/02-baa.mp3", words: ['<span class="gold">بَ</span>اب','كَ<span class="gold">بِ</span>ير','كِتَا<span class="gold">ب</span>']},
            { letter: "ت", audio: "audio/03-taa.mp3", words: ['<span class="gold">تَ</span>مْر','كِ<span class="gold">تَ</span>اب','بَيْ<span class="gold">ت</span>']},
            { letter: "ث", audio: "audio/04-thaa.mp3", words: ['<span class="gold">ثَ</span>وْب','مَ<span class="gold">ثَ</span>ل','بَحَ<span class="gold">ث</span>']},
            { letter: "ج", audio: "audio/05-jim.mp3", words: ['<span class="gold">جَ</span>مَل','رَ<span class="gold">جُ</span>ل','بُرْ<span class="gold">ج</span>']},
            { letter: "ح", audio: "audio/06-haa.mp3", words: ['<span class="gold">حَ</span>بْل','بَ<span class="gold">حْ</span>ر','مِفْتَا<span class="gold">ح</span>']},
            { letter: "خ", audio: "audio/07-khaa.mp3", words: ['<span class="gold">خُ</span>بْز','نَ<span class="gold">خْ</span>ل','مَطْبَ<span class="gold">خ</span>']},
            { letter: "د", audio: "audio/08-dal.mp3", words: ['<span class="gold">دُ</span>ب','مَ<span class="gold">دْ</span>رَسَة','وَلَ<span class="gold">د</span>']},
            { letter: "ذ", audio: "audio/09-dhal.mp3", words: ['<span class="gold">ذَ</span>هَب','هَ<span class="gold">ذَ</span>ا','لَذِي<span class="gold">ذ</span>']},
            { letter: "ر", audio: "audio/10-raa.mp3", words: ['<span class="gold">رَ</span>جُل','وَ<span class="gold">رْ</span>دَة','قَمَ<span class="gold">ر</span>']},
            { letter: "ز", audio: "audio/11-zay.mp3", words: ['<span class="gold">زَ</span>يْت','مَوْ<span class="gold">زَ</span>ة','خُبْ<span class="gold">ز</span>']},
            { letter: "س", audio: "audio/12-siin.mp3", words: ['<span class="gold">سَ</span>مَك','مَ<span class="gold">سْ</span>جِد','دَرْ<span class="gold">س</span>']},
            { letter: "ش", audio: "audio/13-shiin.mp3", words: ['<span class="gold">شَ</span>مْس','مِ<span class="gold">شْ</span>مِش','عَرْ<span class="gold">ش</span>']},
            { letter: "ص", audio: "audio/14-saad.mp3", words: ['<span class="gold">صَ</span>بْر','بَ<span class="gold">صِ</span>ير','نَ<span class="gold">ص</span>']},
            { letter: "ض", audio: "audio/15-daad.mp3", words: ['<span class="gold">ضَ</span>وْء','مَرِي<span class="gold">ض</span>','أَرْ<span class="gold">ض</span>']},
            { letter: "ط", audio: "audio/16-taaa.mp3", words: ['<span class="gold">طِ</span>ين','مَ<span class="gold">طَ</span>ر','قِ<span class="gold">ط</span>']},
            { letter: "ظ", audio: "audio/17-zaa.mp3", words: ['<span class="gold">ظِ</span>ل','عَ<span class="gold">ظِ</span>يم','حَ<span class="gold">ظ</span>']},
            { letter: "ع", audio: "audio/18-ayn.mp3", words: ['<span class="gold">عَ</span>يْن','مَلْ<span class="gold">عَ</span>ب','جَمْ<span class="gold">ع</span>']},
            { letter: "غ", audio: "audio/19-ghayn.mp3", words: ['<span class="gold">غَ</span>يْم','مَ<span class="gold">غْ</span>رِب','صِبْ<span class="gold">غ</span>']},
            { letter: "ف", audio: "audio/20-faa.mp3", words: ['<span class="gold">فِ</span>يل','مِ<span class="gold">فْ</span>تَاح','صَيْ<span class="gold">ف</span>']},
            { letter: "ق", audio: "audio/21-qaaf.mp3", words: ['<span class="gold">قَ</span>مَر','بَ<span class="gold">قَ</span>رَة','سُو<span class="gold">ق</span>']},
            { letter: "ك", audio: "audio/22-kaaf.mp3", words: ['<span class="gold">كَ</span>أْس','مَ<span class="gold">كْ</span>تَبَة','سَمَ<span class="gold">ك</span>']},
            { letter: "ل", audio: "audio/23-laam.mp3", words: ['<span class="gold">لَ</span>بَن','قَ<span class="gold">لَ</span>م','جَبَ<span class="gold">ل</span>']},
            { letter: "م", audio: "audio/24-miim.mp3", words: ['<span class="gold">مَ</span>اء','سَ<span class="gold">مَ</span>ك','قَلَ<span class="gold">م</span>']},
            { letter: "ن", audio: "audio/25-nuun.mp3", words: ['<span class="gold">نَ</span>جْم','عِ<span class="gold">نَ</span>ب','عَيْ<span class="gold">ن</span>']},
            { letter: "ه", audio: "audio/26-haaa.mp3", words: ['<span class="gold">هِ</span>لَال','نَ<span class="gold">هْ</span>ر','وَجْ<span class="gold">ه</span>']},
            { letter: "و", audio: "audio/27-waaw.mp3", words: ['<span class="gold">وَ</span>رْد','قَ<span class="gold">وْ</span>س','ضَ<span class="gold">وْ</span>ء']},
            { letter: "ي", audio: "audio/28-yaa.mp3", words: ['<span class="gold">يَ</span>د','بَ<span class="gold">يْ</span>ت','كُرْسِ<span class="gold">ي</span>']}
        ];

        let playerName = "", questions = [], currentIndex = 0, score = 0, currentAudio = null, toastTimeout = null;
        let isProcessing = false;

        function startQuiz() {
            playerName = document.getElementById('player-name').value.trim() || "Participant";
            questions = [...wordsData].sort(() => Math.random() - 0.5);
            document.getElementById('view-welcome').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            isProcessing = false;
            const q = questions[currentIndex];
            document.getElementById('progress-fill').style.width = `${(currentIndex / 28) * 100}%`;
            document.getElementById('quiz-word').innerHTML = q.words[Math.floor(Math.random() * q.words.length)];
            
            const options = [q.letter, ...alphabetOnly.filter(l => l !== q.letter).sort(() => Math.random() - 0.5).slice(0, 3)].sort(() => Math.random() - 0.5);
            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            
            options.forEach(l => {
                const card = document.createElement('div'); 
                card.className = 'option-card ar-text'; 
                card.innerText = l;
                
                card.onclick = () => {
                    if(isProcessing) return;
                    isProcessing = true;
                    
                    if (l === q.letter) { 
                        score++; 
                        card.classList.add('correct'); 
                    } else { 
                        card.classList.add('wrong'); 
                        if (navigator.vibrate) navigator.vibrate(200);
                        // Montrer la bonne réponse
                        Array.from(grid.children).forEach(c => {
                            if(c.innerText === q.letter) c.classList.add('correct');
                        });
                    }
                    setTimeout(() => { 
                        currentIndex++; 
                        if (currentIndex < 28) loadQuestion(); 
                        else finish(); 
                    }, 1200);
                };
                grid.appendChild(card);
            });
            setTimeout(() => { playWordAudio(); }, 400);
        }

        function playWordAudio() {
            const audioPath = questions[currentIndex].audio;
            if (!audioPath) return;

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            
            currentAudio = new Audio(audioPath);
            let playPromise = currentAudio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.error("Audio error:", error);
                    showToast();
                });
            }
        }
        
        function showToast() {
            clearTimeout(toastTimeout);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        function finish() {
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-certificate').classList.remove('hidden');
            
            document.getElementById('progress-fill').style.width = `100%`;
            document.getElementById('cert-name').innerText = playerName;
            document.getElementById('cert-score').innerText = `${score} / 28`;
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            // Audio Mabruk blindé
            const mabrukAudio = new Audio("mabruk.mp3");
            let playPromise = mabrukAudio.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => console.log("Erreur mabruk:", e));
            }
        }
    </script>
</body>
</html>
